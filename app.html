<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AD Secure Concept — Espace Administrateur</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══ DESIGN TOKENS — alignés sur le site vitrine ══════════════════════════ */
:root{
  --nuit:#1A2118;
  --teal1:#3286A0;
  --teal2:#299AC3;
  --sand:#DED3BC;
  --cream:#F7F4ED;
  --paper:#FFFFFF;
  --ink:rgba(26,33,24,1);
  --ink2:rgba(26,33,24,0.62);
  --ink3:rgba(26,33,24,0.38);
  --line:rgba(26,33,24,0.1);
  --line-med:rgba(26,33,24,0.15);
  --display:'Lora',Georgia,serif;
  --body:'Inter',-apple-system,sans-serif;
  --sidebar-w:240px;
  --sidebar-collapsed:60px;
  --topbar-h:60px;
  --radius:14px;
  --shadow:0 1px 3px rgba(26,33,24,0.08),0 4px 16px rgba(26,33,24,0.04);
  --shadow-md:0 8px 32px rgba(26,33,24,0.12);
}

/* ══ RESET ════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;overflow-x:hidden;width:100%;}
body{font-family:var(--body);background:#F7F4ED;color:#1A2118;min-height:100vh;width:100%;max-width:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#app-screen{background:#F7F4ED;min-height:100vh;width:100%;max-width:100%;overflow-x:hidden;position:relative;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
button{font-family:var(--body);}

/* ══ SIDEBAR ══════════════════════════════════════════════════════════════ */
#sidebar{
  width:var(--sidebar-w);
  background:var(--nuit);
  display:flex;flex-direction:column;
  position:fixed;top:0;bottom:0;left:0;z-index:200;
  box-shadow:2px 0 24px rgba(0,0,0,0.18);
  transition:width 0.25s ease;
  overflow:hidden;
}
#sidebar-header{
  padding:22px 18px 16px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  text-align:center;
  flex-shrink:0;
}
#logo-placeholder{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal1),var(--teal2));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;font-size:24px;
  transition:opacity 0.2s,max-height 0.25s;overflow:hidden;
}
#app-name{
  font-family:var(--display);color:var(--sand);
  font-weight:700;font-size:17px;line-height:1.2;
  transition:opacity 0.2s,max-height 0.2s;overflow:hidden;
}
#app-sub{
  color:var(--teal2);font-size:10px;
  letter-spacing:0.2em;text-transform:uppercase;
  margin-top:3px;
  transition:opacity 0.2s,max-height 0.2s;overflow:hidden;
}
#sidebar-divider{
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal1),transparent);
  margin:10px auto 0;
  transition:opacity 0.2s;
}
#nav{flex:1;padding:10px 8px;overflow-y:auto;}
#nav::-webkit-scrollbar{width:3px;}
#nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:9px;border:none;
  background:transparent;color:rgba(222,211,188,0.48);
  cursor:pointer;font-size:13px;font-weight:500;
  margin-bottom:2px;text-align:left;
  font-family:var(--body);
  transition:all 0.15s;white-space:nowrap;overflow:hidden;
}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:rgba(222,211,188,0.88);}
.nav-btn.active{
  background:rgba(50,134,160,0.22);
  color:var(--teal2);font-weight:700;
}
.nav-badge{
  background:#ef4444;color:#fff;
  font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:10px;margin-left:auto;flex-shrink:0;
}
.sidebar-label{transition:opacity 0.2s,max-width 0.2s;white-space:nowrap;overflow:hidden;flex:1;}
#sidebar-bottom{
  padding:8px 8px 12px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;gap:2px;
  flex-shrink:0;
  transition:opacity 0.2s;
}
#sidebar-toggle{
  width:32px;height:32px;border-radius:7px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all 0.2s;
  color:rgba(222,211,188,0.6);flex-shrink:0;
}
#sidebar-toggle:hover{background:rgba(255,255,255,0.12);color:var(--sand);}

/* ══ MAIN ═════════════════════════════════════════════════════════════════ */
#main{margin-left:240px;min-height:100vh;transition:margin-left 0.25s ease;}
@media(min-width:769px) and (max-width:1100px){#main{margin-left:200px!important;}#sidebar{width:200px!important;}}

/* ══ TOPBAR ═══════════════════════════════════════════════════════════════ */
#topbar{
  background:rgba(247,244,237,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:0 24px 0 20px;
  height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  gap:12px;
}
#page-title{
  font-family:var(--display);font-size:16px;font-weight:700;
  color:var(--nuit);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(50,134,160,0.1);
  border:1.5px solid rgba(50,134,160,0.2);
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;color:var(--teal1);
}
.icon-btn:hover{background:var(--nuit);color:#fff;border-color:var(--nuit);}
#alert-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:999px;
  border:1.5px solid #fca5a5;background:#fef2f2;
  color:#991b1b;cursor:pointer;font-weight:700;font-size:12px;
  transition:all 0.2s;
}
#alert-btn:hover{background:#fee2e2;}
#burger-btn{
  display:none;width:38px;height:38px;border-radius:9px;
  border:1.5px solid var(--line-med);background:var(--paper);
  align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;flex-shrink:0;
  color:var(--nuit);
}
#back-btn{
  width:34px;height:34px;border-radius:9px;
  border:1.5px solid var(--line);background:var(--paper);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--ink2);transition:all 0.2s;
}
#back-btn:hover{background:var(--cream);border-color:var(--line-med);}

/* ══ CONTENT ══════════════════════════════════════════════════════════════ */
#content{padding:28px 32px;background:#F7F4ED;min-height:calc(100vh - 60px);}
#main{background:#F7F4ED;}

/* ══ KPI CARDS ════════════════════════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi{
  background:#FFFFFF;border-radius:var(--radius);
  padding:16px 20px;border:1px solid rgba(26,33,24,0.1);
  box-shadow:var(--shadow);
  transition:box-shadow 0.2s,transform 0.2s;
}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kpi-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:8px;color:rgba(26,33,24,0.38);
}
.kpi-value{font-family:var(--display);font-size:28px;font-weight:700;line-height:1;}
.kpi-value.small{font-size:18px;}

/* ══ SECTION CARDS ════════════════════════════════════════════════════════ */
.section-card{
  background:#FFFFFF;border-radius:var(--radius);
  border:1px solid rgba(26,33,24,0.1);overflow:hidden;
  margin-bottom:18px;box-shadow:var(--shadow);
}
.section-head{
  padding:16px 20px 14px;
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;
}
.section-title{
  font-family:var(--display);font-weight:700;font-size:15px;color:var(--nuit);
}
.section-sub{font-size:11px;color:var(--ink3);margin-top:2px;}

/* ══ LAYOUT ═══════════════════════════════════════════════════════════════ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* ══ BADGE ════════════════════════════════════════════════════════════════ */
.badge{
  font-size:11px;font-weight:700;padding:3px 9px;
  border-radius:999px;white-space:nowrap;
}

/* ══ BUTTONS ══════════════════════════════════════════════════════════════ */
.btn-add{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;border:none;
  cursor:pointer;font-size:13px;font-weight:700;
  font-family:var(--body);transition:all 0.2s;
}
.btn-add:hover{transform:translateY(-1px);filter:brightness(1.08);}
.btn-sm{
  padding:5px 10px;border-radius:7px;
  border:1.5px solid var(--line-med);
  background:var(--cream);cursor:pointer;font-size:12px;
  font-family:var(--body);transition:all 0.15s;color:var(--ink2);
}
.btn-sm:hover{background:var(--paper);border-color:var(--teal1);color:var(--teal1);}
.btn-danger{border-color:#fecaca!important;background:#fef2f2!important;color:#991b1b!important;}
.btn-danger:hover{background:#fee2e2!important;border-color:#f87171!important;}
.btn-edit{border-color:#bfdbfe!important;background:#eff6ff!important;color:#1d4ed8!important;}
.btn-edit:hover{background:#dbeafe!important;}

/* ══ TABLES ═══════════════════════════════════════════════════════════════ */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  padding:11px 18px;text-align:left;
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.07em;white-space:nowrap;
  border-bottom:1px solid var(--line);
  color:var(--ink3);background:var(--cream);
}
td{
  padding:12px 18px;
  border-bottom:1px solid rgba(26,33,24,0.06);
  color:var(--ink);
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(50,134,160,0.03);}

/* ══ HERO DASHBOARD ══════════════════════════════════════════════════════ */
.db-hero{
  border-radius:20px;padding:28px 32px;margin-bottom:22px;
  color:#fff;position:relative;overflow:hidden;
}
.db-hero::before{
  content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='400' height='200' viewBox='0 0 400 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='350' cy='50' r='180' fill='rgba(255,255,255,0.04)'/%3E%3Ccircle cx='380' cy='160' r='100' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E") right center no-repeat;
  pointer-events:none;
}
.hero-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px;}
.hero-kpi{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:11px;padding:12px 14px;cursor:pointer;
  transition:background 0.15s;
}
.hero-kpi:hover{background:rgba(255,255,255,0.16);}
.hero-kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;opacity:0.65;font-weight:600;}
.hero-kpi-value{font-family:var(--display);font-size:22px;font-weight:700;}

/* ══ ALERT BARS ═══════════════════════════════════════════════════════════ */
.alert-bar{
  border-radius:12px;padding:13px 18px;
  display:flex;gap:12px;align-items:center;
  cursor:pointer;margin-bottom:12px;
  border:1.5px solid;
  transition:filter 0.2s;
}
.alert-bar:hover{filter:brightness(0.97);}

/* ══ PLANNING ═════════════════════════════════════════════════════════════ */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 10px 16px;}
.day-col{padding:4px;}
.day-header{text-align:center;margin-bottom:8px;}
.day-name{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--ink3);}
.day-num{
  width:28px;height:28px;border-radius:50%;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin:2px auto;color:var(--ink);
}
.day-num.today{background:var(--teal1);color:#fff;}
.ev-pill{
  border-left:3px solid;border-radius:6px;
  padding:4px 6px;margin-bottom:3px;cursor:pointer;
  position:relative;
}
.ev-title{font-weight:700;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-size:10px;color:var(--ink3);}
.ev-del{position:absolute;top:2px;right:2px;font-size:10px;cursor:pointer;opacity:0.6;display:none;}
.ev-pill:hover .ev-del{display:block;}

/* ══ STOCK ════════════════════════════════════════════════════════════════ */
.stock-bar-bg{height:4px;border-radius:3px;background:var(--line);margin-top:4px;}
.stock-bar{height:100%;border-radius:3px;}

/* ══ TACHES ══════════════════════════════════════════════════════════════ */
.tache-row{
  padding:10px 20px;border-bottom:1px solid rgba(26,33,24,0.06);
  display:flex;gap:10px;align-items:center;
}
.tache-row:last-child{border-bottom:none;}
.tache-check{
  width:18px;height:18px;border-radius:5px;
  border:2px solid var(--line-med);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:10px;color:#fff;background:transparent;
  transition:all 0.15s;
}
.tache-check:hover{border-color:var(--teal1);}
.tache-check.done{background:#15803d;border-color:#15803d;}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ══ QUICK GRID ══════════════════════════════════════════════════════════ */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.quick-btn{
  background:var(--paper);border-radius:var(--radius);
  padding:20px;cursor:pointer;text-align:left;
  width:100%;transition:all 0.18s;
  font-family:var(--body);border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.quick-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(50,134,160,0.25);}

/* ══ CMD ROWS ════════════════════════════════════════════════════════════ */
.cmd-row{
  padding:12px 20px;border-bottom:1px solid rgba(26,33,24,0.06);
  display:flex;justify-content:space-between;align-items:center;
}
.cmd-row:last-child{border-bottom:none;}

/* ══ LOGIN ════════════════════════════════════════════════════════════════ */
#login-screen{
  min-height:100vh;width:100%;
  align-items:center;justify-content:center;
  background:#1A2118;
  position:relative;overflow:auto;
}
#login-screen::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 900px 600px at 75% 40%,rgba(50,134,160,0.25),transparent 65%),
             radial-gradient(ellipse 500px 500px at 20% 80%,rgba(41,154,195,0.12),transparent 60%);
  pointer-events:none;
}
.login-card{
  background:var(--paper);border-radius:24px;
  padding:40px 32px;width:100%;max-width:420px;
  box-shadow:0 32px 80px rgba(0,0,0,0.3);
  margin:20px;box-sizing:border-box;
  position:relative;z-index:1;
}
.login-card .eyebrow{
  display:flex;align-items:center;gap:9px;
  font-size:10.5px;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--teal1);margin-bottom:6px;
}
.login-card .eyebrow::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--teal2);box-shadow:0 0 0 3px rgba(41,154,195,0.18);
  flex-shrink:0;
}

/* ══ MODAL ════════════════════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(26,33,24,0.45);
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--paper);border-radius:20px;
  width:100%;max-width:520px;max-height:90vh;
  overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.2);
}
.modal-head{
  padding:20px 24px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--paper);z-index:1;
}
.modal-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--nuit);}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink3);transition:color 0.2s;}
.modal-close:hover{color:var(--nuit);}
.modal-body{padding:22px 24px;}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--line);
  display:flex;gap:8px;justify-content:flex-end;
}
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px;
}
.field input,.field select,.field textarea{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--line-med);font-size:13.5px;
  color:var(--nuit);background:var(--cream);outline:none;
  font-family:var(--body);box-sizing:border-box;transition:border-color 0.2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--teal1);background:var(--paper);
}
.field textarea{min-height:80px;resize:vertical;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn-save{
  padding:10px 22px;border-radius:999px;border:none;
  cursor:pointer;font-weight:700;font-size:13px;
  font-family:var(--body);color:#fff;transition:all 0.2s;
}
.btn-save:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-cancel{
  padding:10px 22px;border-radius:999px;
  border:1.5px solid var(--line-med);background:var(--paper);
  color:var(--ink2);cursor:pointer;font-weight:600;font-size:13px;
  font-family:var(--body);transition:all 0.2s;
}
.btn-cancel:hover{border-color:var(--nuit);color:var(--nuit);}

/* ══ PANEL ════════════════════════════════════════════════════════════════ */
.panel-overlay{position:fixed;inset:0;z-index:500;display:flex;justify-content:flex-end;}
.panel-bg{position:absolute;inset:0;background:rgba(26,33,24,0.3);backdrop-filter:blur(2px);}
.panel{
  position:relative;width:360px;height:100vh;
  background:var(--paper);overflow-y:auto;
  display:flex;flex-direction:column;
  box-shadow:-8px 0 40px rgba(0,0,0,0.12);
}
.panel-head{
  padding:20px 24px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--paper);z-index:1;
}
.panel-title{font-family:var(--display);font-weight:700;font-size:15px;color:var(--nuit);}
.panel-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink3);}
.panel-body{padding:20px 24px;flex:1;}
.panel-footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:8px;}
.field-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;display:block;}
input[type=text],input[type=color],input[type=number],input[type=date],input[type=time],select,textarea{font-family:var(--body);}
.color-row{display:flex;gap:8px;align-items:center;}
.color-row input[type=text]{flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid var(--line-med);font-size:13px;color:var(--nuit);background:var(--cream);outline:none;box-sizing:border-box;}
input[type=color]{width:44px;height:34px;padding:2px;cursor:pointer;border-radius:8px;border:1.5px solid var(--line-med);}
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.preset-btn{padding:8px 4px;border-radius:9px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--ink2);}
.preset-dots{display:flex;gap:3px;}
.preset-dot{width:12px;height:12px;border-radius:50%;}
.btn-reset{flex:1;padding:10px;border-radius:999px;border:1.5px solid var(--line-med);background:var(--paper);color:var(--ink2);cursor:pointer;font-weight:600;font-size:13px;font-family:var(--body);}

// Mots de passe stockés en hash SHA-256. Valeurs de démo : admin123 / user123
// hash de "admin123" et "user123" pré-calculés
const USERS=[
  {id:"u1",login:"admin",passHash:"240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9",nom:"Administrateur",role:"admin",email:"admin@adsecure.fr",tel:"",poste:"Gérant",avatar:"",actif:true,creeLe:"2026-01-01"},

];
let currentUser=null;
let isLoggedIn=false;

// ── Hashage SHA-256 (API native du navigateur) avec fallback ────────────────
async function hashPassword(pwd){
  try{
    if(crypto && crypto.subtle){
      const data=new TextEncoder().encode(pwd);
      const buf=await crypto.subtle.digest("SHA-256",data);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
  }catch(e){ console.warn("crypto.subtle indisponible, fallback simple"); }
  // Fallback simple (si crypto.subtle indisponible) — moins sûr mais fonctionnel
  let h=0;for(let i=0;i<pwd.length;i++){h=((h<<5)-h+pwd.charCodeAt(i))|0;}
  return "fb_"+Math.abs(h).toString(16);
}

// ── Journal d'activité ──────────────────────────────────────────────────────
let JOURNAL=[];
function logActivity(action,details){
  JOURNAL.unshift({
    id:uid(),
    ts:new Date().toISOString(),
    user:currentUser?currentUser.nom:"Système",
    login:currentUser?currentUser.login:"—",
    action,
    details:details||""
  });
  if(JOURNAL.length>200) JOURNAL=JOURNAL.slice(0,200); // garder les 200 derniers
  saveData();
}

function checkLogin(){
  const saved=sessionStorage.getItem("gp_user");
  if(saved){currentUser=JSON.parse(saved);isLoggedIn=true;return true;}
  return false;
}
async function doLogin(){
  const login=document.getElementById("login-input").value.trim();
  const pwd=document.getElementById("pwd-input").value.trim();
  const err=document.getElementById("login-error");
  // Récupérer la liste des utilisateurs à jour depuis le cloud avant de vérifier
  err.textContent="Vérification…";err.style.display="block";err.style.color="#64748b";err.style.background="#f1f5f9";err.style.borderColor="#cbd5e1";
  await syncPull();
  err.style.display="none";err.style.color="";err.style.background="";err.style.borderColor="";
  const hash=await hashPassword(pwd);
  // Accepte le nouveau format (passHash) ET l'ancien format (password en clair, pour migration)
  const u=USERS.find(x=>x.login===login&&(x.passHash===hash||x.password===pwd));
  if(u && u.actif!==false){
    // Migration : si l'utilisateur avait l'ancien format, on le convertit
    if(!u.passHash && u.password){
      u.passHash=hash;
      delete u.password;
      saveData();
    }
    currentUser=u;isLoggedIn=true;
    sessionStorage.setItem("gp_user",JSON.stringify(u));
    logActivity("Connexion","Connexion réussie");
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app-screen").style.display="flex";
    applyTheme();
    initSidebar();
    renderNav();renderPage();
    // Récupérer les données du cloud après connexion
    syncPull().then(ok=>{ if(ok){ applyTheme(); renderNav(); renderPage(); } });
  } else if(u && u.actif===false){
    err.textContent="Ce compte est désactivé";err.style.display="block";
    document.getElementById("pwd-input").value="";
  } else {
    err.textContent="Identifiants incorrects";err.style.display="block";
    document.getElementById("pwd-input").value="";
  }
}
function doLogout(){
  logActivity("Déconnexion","");
  isLoggedIn=false;currentUser=null;
  sessionStorage.removeItem("gp_user");
  document.getElementById("app-screen").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("login-input").value="";
  document.getElementById("pwd-input").value="";
  document.getElementById("login-error").style.display="none";
}

// Envoyer les données vers Supabase
async function syncPush(){
  setSyncBadge("syncing");
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${SYNC_ROW_ID}`,{
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({data:getDataObject(),updated_at:new Date().toISOString()})
    });
    if(res.status===404 || res.status===204){
      // La ligne n'existe pas encore → on la crée
      if(res.status===404) await syncInsert();
    }
    if(!res.ok && res.status!==204){
      // Tenter une insertion si patch échoue
      await syncInsert();
    }
    setSyncBadge("ok");
    return true;
  }catch(e){
    console.warn("Sync push échec:",e);
    setSyncBadge("offline");
    return false;
  }
}
async function syncInsert(){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/app_data`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":`Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json",
      "Prefer":"return=minimal"
    },
    body:JSON.stringify({id:SYNC_ROW_ID,data:getDataObject(),updated_at:new Date().toISOString()})
  });
  return res.ok;
}

// Récupérer les données depuis Supabase
async function syncPull(){
  setSyncBadge("syncing");
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${SYNC_ROW_ID}&select=data`,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok){setSyncBadge("error");return false;}
    const rows=await res.json();
    if(rows.length>0 && rows[0].data){
      applyDataObject(rows[0].data);
      saveDataLocal();
      setSyncBadge("ok");
      return true;
    }
    // Aucune donnée en ligne → on pousse les données locales
    await syncInsert();
    setSyncBadge("ok");
    return true;
  }catch(e){
    console.warn("Sync pull échec:",e);
    setSyncBadge("offline");
    return false;
  }
}

// Synchro manuelle complète (pull puis re-render)
async function manualSync(){
  const ok=await syncPull();
  if(ok){ applyTheme(); renderNav(); renderPage(); }
  else { alert("Synchronisation impossible. Vérifiez votre connexion internet."); }
}

function saveData(){
  // 1. Sauvegarde locale immédiate (toujours, même hors-ligne)
  saveDataLocal();
  // 2. Synchro Supabase différée (regroupe les modifications rapprochées)
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{ syncPush(); }, 1500);
}

function importData(ev){
  const file=ev.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.CLIENTS && !d.PROSPECTS){alert("Fichier invalide : ce n'est pas une sauvegarde AD Secure.");return;}
      if(!confirm("Importer cette sauvegarde ? Vos données actuelles seront remplacées.")) return;
      if(d.CLIENTS) CLIENTS=d.CLIENTS;
      if(d.EVENTS) EVENTS=d.EVENTS;
      if(d.STOCK) STOCK=d.STOCK;
      if(d.COMMANDES) COMMANDES=d.COMMANDES;
      if(d.FACTURES) FACTURES=d.FACTURES;
      if(d.TACHES) TACHES=d.TACHES;
      if(d.PROSPECTS) PROSPECTS=d.PROSPECTS;
      if(d.TH) TH=Object.assign({},DEF_TH,d.TH);
      if(d.RUBS) RUBS=d.RUBS;
      if(d.USERS && Array.isArray(d.USERS) && d.USERS.length>0){USERS.length=0;d.USERS.forEach(u=>USERS.push(u));}
      if(d.JOURNAL && Array.isArray(d.JOURNAL)) JOURNAL=d.JOURNAL;
      if(typeof d.pipeNextId==="number") pipeNextId=d.pipeNextId;
      saveData();
      logActivity("Import","Sauvegarde importée");
      alert("Importation réussie ! L'application va se recharger.");
      location.reload();
    }catch(err){
      alert("Erreur lors de la lecture du fichier : "+err.message);
    }
  };
  reader.readAsText(file);
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function renderNav(){
  const nav=document.getElementById("nav");
  const ac=alertCount();
  nav.innerHTML=activeRubs().map(r=>{
    const isAct=currentPage===r.id;
    const bc=isAct?`background:${TH.c1}28`:"";
    const tc=isAct?TH.c2:`${TH.sand}80`;
    const bdg=r.id==="db"&&ac>0?`<span class="nav-badge">${ac}</span>`:"";
    return`<button class="nav-btn${isAct?" active":""}" onclick="goTo('${r.id}')" style="color:${tc};${bc};font-family:'${TH.police}',Georgia,serif">
      <span>${r.icon}</span><span class="sidebar-label" style="flex:1">${r.label}</span>${bdg}
    </button>`;}).join("");
  const ab=document.getElementById("alert-btn");
  if(ab){ab.style.display=ac>0?"flex":"none";const span=document.getElementById("alert-count");if(span)span.textContent=ac;}
  const bb=document.getElementById("back-btn");
  if(bb){bb.style.opacity=pageHistory.length>0?"1":"0.3";bb.style.cursor=pageHistory.length>0?"pointer":"default";}
  const av=document.getElementById("user-avatar");
  if(av&&currentUser){
    if(currentUser.avatar){
      av.innerHTML=`<img src="${currentUser.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
      av.style.padding="0";av.style.overflow="hidden";
    } else {
      av.textContent=currentUser.nom.charAt(0).toUpperCase();
    }
    av.title=currentUser.nom+" · Réglages";
  }
  const pt=document.getElementById("page-title");
  if(pt){
    let title="Tableau de bord";
    if(currentPage==="client-fiche"&&selectedClientId){const c=CLIENTS.find(x=>x.id===selectedClientId);title=c?c.nom:"Fiche client";}
    else if(currentPage==="client-fiche"&&selectedClientId){const cli=CLIENTS.find(x=>x.id===selectedClientId);title=cli?cli.nom:"Fiche client";}
    else title=RUBS.find(r=>r.id===currentPage)?.label||"Tableau de bord";
    pt.textContent=title;pt.style.fontFamily=`'${TH.police}',Georgia,serif`;pt.style.color=TH.txt;
  }
  saveData();
}
function goTo(id){
  closeSidebar();
  const r=RUBS.find(x=>x.id===id);
  const newPage=(r&&r.actif)?id:"db";
  if(newPage!==currentPage) pageHistory.push(currentPage);
  currentPage=newPage;
  if(newPage!=="client-fiche") selectedClientId=null;
  closeModal();
  renderNav();
  renderPage();
}
function openClientFiche(clientId){
  selectedClientId=clientId;
  pageHistory.push(currentPage);
  currentPage="client-fiche";
  closeModal();
  renderNav();
  renderPage();
}
function goBack(){
  if(pageHistory.length===0) return;
  currentPage=pageHistory.pop();
  renderNav();
  renderPage();
}

function showModal(title,body,footer){

      <div class="modal">

        <div class="modal-body">${body}</div>
        <div class="modal-footer">${footer}</div>
      </div>
    </div>`;
}
function closeModal(){document.getElementById("modal-container").innerHTML="";}
let _pendingDel=null;
function confirmDel(msg,fn){
  _pendingDel=fn;
  showModal("Confirmer la suppression",`<p style="font-size:14px;color:#475569">${msg}</p>`,
    `<button class="btn-cancel" onclick="closeModal()">Annuler</button>
     <button class="btn-save" style="background:#991b1b" onclick="closeModal();if(_pendingDel){_pendingDel();_pendingDel=null;}">Supprimer</button>`);

    {id:"chantier",label:"Chantiers",color:"#b08d57"},

        <div class="kpi-label" style="color:${TH.txt}">RDV clients</div>
        <div class="kpi-value" style="color:#299AC3">${EVENTS.filter(e=>e.type==="rdv").length}</div>
      </div>

        <div class="kpi-label" style="color:${TH.txt}">Chantiers</div>
        <div class="kpi-value" style="color:#b08d57">${EVENTS.filter(e=>e.type==="chantier").length}</div>
      </div>
      <div class="kpi" style="background:${TH.card};${planningFilter==="prospection"?"box-shadow:0 0 0 2px #3286A0":""}" onclick="planningFilter='prospection';renderPage()">
        <div class="kpi-label" style="color:${TH.txt}">Prospections</div>

          <button class="btn-sm" onclick="currentWeekOffset=0;renderPage()">Auj.</button>
        </div>
        <button class="btn-add" style="background:${TH.c1};color:#fff" onclick="modalEvent()">＋ Ajouter</button>
      </div>
      <div class="week-grid" id="week-grid-container">
        ${week.map((day,i)=>{
          const isT=day===TODAY;
          const evs=EVENTS
            .filter(e=>e.date===day&&(planningFilter==="tous"||e.type===planningFilter))
            .sort((a,b)=>a.heure.localeCompare(b.heure));
          return`<div class="day-col"

function pipeFilter(list){
  const q=pipeSearch.toLowerCase().trim();
  if(!q) return list;
  return list.filter(p=>[p.name,p.company,p.email,p.notes].join(" ").toLowerCase().includes(q));
}
function pipeStats(){
  const active=PROSPECTS.filter(p=>p.stage!=="perdu"&&p.stage!=="gagne");
  const won=PROSPECTS.filter(p=>p.stage==="gagne");
  const pipeline=active.reduce((s,p)=>s+p.amount,0);
  const wonAmt=won.reduce((s,p)=>s+p.amount,0);
  const total=PROSPECTS.filter(p=>p.stage==="gagne"||p.stage==="perdu").length;
  const txConv=total>0?Math.round(won.length/total*100):0;
  const urgent=PROSPECTS.filter(p=>p.date&&p.date<=TODAY&&p.stage!=="gagne"&&p.stage!=="perdu").length;
  return{active,won,pipeline,wonAmt,txConv,urgent,total:PROSPECTS.length};
}

    .pipe-tag{font-size:9px;padding:2px 6px;border-radius:20px;font-weight:700;text-transform:uppercase}
    .pipe-tag-chaud{background:#fdecea;color:#c0392b}
    .pipe-tag-tiede{background:#fef5e7;color:#e67e22}
    .pipe-tag-froid{background:#e8f4f8;color:#3286A0}
    .pipe-card-date{font-size:9px;color:${th.txt}66;display:flex;align-items:center;gap:3px}
    .pipe-card-acts{position:absolute;top:7px;right:7px;display:flex;gap:3px;opacity:0;transition:opacity 0.18s}
    .pipe-card:hover .pipe-card-acts{opacity:1}
    .pipe-card-btn{background:white;border:1px solid #ddd;border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
    .pipe-card-btn:hover{background:${th.bg}}
    .pipe-card-btn.del:hover{background:#fdecea;border-color:#c0392b}
    .pipe-drop-over{background:rgba(50,134,160,0.08)!important;outline:2px dashed ${th.c1}}
    .pipe-add-btn{margin:7px 9px 9px;padding:7px;border:1.5px dashed ${th.sand};border-radius:7px;background:none;color:${th.txt}55;font-size:11px;cursor:pointer;width:calc(100% - 18px);font-family:'${th.police}',Georgia,serif;transition:all 0.2s;text-align:center}
    .pipe-add-btn:hover{border-color:${th.c1};color:${th.c1};background:rgba(50,134,160,0.05)}
    .pipe-empty{padding:14px;text-align:center;color:${th.txt}44;font-size:11px;font-style:italic}
    .pipe-search{padding:8px 13px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:'${th.police}',Georgia,serif;width:200px;background:${th.bg};color:${th.txt};outline:none}
    .pipe-search:focus{border-color:${th.c1}}
  </style>
  <div class="kpi-grid" style="margin-bottom:18px">
    ${kpi("Prospects actifs",st.active.length,th.c1)}
    ${kpi("Pipeline",fMoney(st.pipeline),th.c2,true)}
    ${kpi("CA gagné",fMoney(st.wonAmt),"#27ae60",true)}
    ${kpi("Taux de conv.",st.txConv+"%","#e67e22")}
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap">
    <input class="pipe-search" placeholder="🔍 Rechercher un prospect..." value="${pipeSearch}" oninput="pipeSearch=this.value;renderPage()">
    <div style="display:flex;gap:8px;align-items:center">
      ${st.urgent>0?`<span style="background:#fef2f2;border:1.5px solid #fca5a5;color:#991b1b;font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px">🔔 ${st.urgent} relance${st.urgent>1?"s":""} urgente${st.urgent>1?"s":""}</span>`:""}
      <button class="btn-add" style="background:${th.c1};color:#fff" onclick="modalProspect()">＋ Nouveau prospect</button>
    </div>
  </div>
  <div class="pipe-board">
    ${PIPE_STAGES.map(stage=>{
      const filtered=pipeFilter(PROSPECTS.filter(p=>p.stage===stage.id));
      const total=filtered.reduce((s,p)=>s+p.amount,0);
      return`<div class="pipe-col">
        <div class="pipe-col-hd">
          <div class="pipe-col-title">
            <span class="pipe-col-dot" style="background:${stage.color}"></span>
            ${stage.label}
            <span class="pipe-col-count">${filtered.length}</span>
          </div>
        </div>
        ${total>0?`<div class="pipe-col-total">${fMoney(total)}</div>`:""}
        <div class="pipe-cards" data-stage="${stage.id}"
          ondragover="event.preventDefault();this.classList.add('pipe-drop-over')"
          ondragleave="this.classList.remove('pipe-drop-over')"
          ondrop="pipeOnDrop(event,'${stage.id}');this.classList.remove('pipe-drop-over')">
          ${filtered.length===0?`<div class="pipe-empty">Glisser ici</div>`:""}
          ${filtered.map(p=>{
            const isUrg=p.date&&p.date<=TODAY&&p.stage!=="gagne"&&p.stage!=="perdu";
            return`<div class="pipe-card" draggable="true"
              ondragstart="pipeDragId='${p.id}';this.classList.add('dragging')"
              ondragend="this.classList.remove('dragging')"
              onclick="pipeDetail('${p.id}')">
              <div class="pipe-card-acts">
                <button class="pipe-card-btn" onclick="modalProspect('${p.id}');event.stopPropagation()">✏️</button>
                <button class="pipe-card-btn del" onclick="delProspect('${p.id}');event.stopPropagation()">🗑️</button>
              </div>
              <div class="pipe-card-name">${p.name}</div>
              ${p.company?`<div class="pipe-card-co">${p.company}</div>`:""}
              <div class="pipe-card-amt">${p.amount?fMoney(p.amount):"—"}</div>
              <div class="pipe-card-meta"><span class="pipe-tag pipe-tag-${p.temp}">${{chaud:"🔴 Chaud",tiede:"🟡 Tiède",froid:"🔵 Froid"}[p.temp]}</span></div>
              ${p.date?`<div class="pipe-card-date" style="${isUrg?"color:#c0392b;font-weight:700":""}">${isUrg?"🔔":"📅"} ${fDate(p.date)}</div>`:""}
            </div>`;
          }).join("")}
        </div>
        <button class="pipe-add-btn" onclick="modalProspect(null,'${stage.id}')">＋ Ajouter</button>
      </div>`;
    }).join("")}
  </div>`;
}
function pipeOnDrop(e,stageId){
  e.preventDefault();
  if(!pipeDragId) return;
  PROSPECTS=PROSPECTS.map(p=>p.id===pipeDragId?{...p,stage:stageId}:p);
  pipeDragId=null;renderPage();
}
function pipeDetail(id){
  const p=PROSPECTS.find(x=>x.id===id);if(!p)return;
  const st=PIPE_STAGES.find(s=>s.id===p.stage);
  showModal(p.name,`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Entreprise</div><div style="font-size:14px;color:${TH.txt}">${p.company||"—"}</div></div>
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Montant</div><div style="font-size:20px;font-weight:700;color:${TH.c1}">${p.amount?fMoney(p.amount):"—"}</div></div>
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Email</div><div style="font-size:13px">${p.email?`<a href="mailto:${p.email}" style="color:${TH.c1}">${p.email}</a>`:"—"}</div></div>
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Téléphone</div><div style="font-size:13px">${p.phone?`<a href="tel:${p.phone}" style="color:${TH.c1}">${p.phone}</a>`:"—"}</div></div>
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Étape</div><div style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:${st?.color};display:inline-block"></span><span style="font-size:13px">${st?.label}</span></div></div>
      <div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Température</div><span class="pipe-tag pipe-tag-${p.temp}">${{chaud:"🔴 Chaud",tiede:"🟡 Tiède",froid:"🔵 Froid"}[p.temp]}</span></div>
      ${p.date?`<div><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px">Relance</div><div style="font-size:13px">📅 ${fDate(p.date)}</div></div>`:""}
    </div>
    ${p.notes?`<div style="padding-top:14px;border-top:1px solid #f1f5f9"><div style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Notes</div><div style="font-size:13px;color:${TH.txt};white-space:pre-wrap;line-height:1.6">${p.notes}</div></div>`:""}`,
    `<button class="btn-cancel" onclick="closeModal()">Fermer</button>
     <button class="btn-save" style="background:${TH.c1}" onclick="closeModal();modalProspect('${id}')">✏️ Modifier</button>`
  );
}
function modalProspect(id,defaultStage){
  const p=id?PROSPECTS.find(x=>x.id===id):{id:"",name:"",company:"",email:"",phone:"",amount:0,temp:"tiede",stage:defaultStage||"contact",date:"",notes:""};
  showModal(id?"Modifier le prospect":"Nouveau prospect",`
    <div class="field-row">
      <div class="field"><label>Prénom Nom *</label><input id="pp-name" value="${p.name}" placeholder="Marie Dupont"/></div>
      <div class="field"><label>Entreprise</label><input id="pp-co" value="${p.company}" placeholder="Société..."/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Email</label><input type="email" id="pp-email" value="${p.email}"/></div>
      <div class="field"><label>Téléphone</label><input type="tel" id="pp-phone" value="${p.phone}"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Montant estimé (€)</label><input type="number" id="pp-amt" value="${p.amount||""}" placeholder="0"/></div>
      <div class="field"><label>Température</label><select id="pp-temp">
        <option value="chaud"${p.temp==="chaud"?" selected":""}>🔴 Chaud</option>
        <option value="tiede"${p.temp==="tiede"?" selected":""}>🟡 Tiède</option>
        <option value="froid"${p.temp==="froid"?" selected":""}>🔵 Froid</option>
      </select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Étape</label><select id="pp-stage">${PIPE_STAGES.map(s=>`<option value="${s.id}"${p.stage===s.id?" selected":""}>${s.label}</option>`).join("")}</select></div>
      <div class="field"><label>Relance prévue</label><input type="date" id="pp-date" value="${p.date||""}"/></div>
    </div>
    <div class="field"><label>Notes</label><textarea id="pp-notes" style="min-height:72px">${p.notes}</textarea></div>`,
    `<button class="btn-cancel" onclick="closeModal()">Annuler</button>
     <button class="btn-save" style="background:${TH.c1}" onclick="saveProspect('${id||""}')">Enregistrer</button>`
  );
}
function saveProspect(id){
  const name=document.getElementById("pp-name").value.trim();
  if(!name){alert("Le nom est obligatoire.");return;}
  const obj={name,company:document.getElementById("pp-co").value.trim(),email:document.getElementById("pp-email").value.trim(),phone:document.getElementById("pp-phone").value.trim(),amount:parseFloat(document.getElementById("pp-amt").value)||0,temp:document.getElementById("pp-temp").value,stage:document.getElementById("pp-stage").value,date:document.getElementById("pp-date").value,notes:document.getElementById("pp-notes").value.trim()};
  if(id){PROSPECTS=PROSPECTS.map(p=>p.id===id?{...p,...obj}:p);}else{PROSPECTS.push({...obj,id:"p"+pipeNextId++});}
  closeModal();renderPage();
}
function delProspect(id){confirmDel("Supprimer ce prospect ?",function(){PROSPECTS=PROSPECTS.filter(p=>p.id!==id);renderPage();});}

// ── STATISTIQUES ────────────────────────────────────────
// ════════════════════════════════════════════════════════
function bar(pct,color,label,value){
  return`<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px">
      <span style="font-weight:600;color:#37301F">${label}</span>
      <span style="font-weight:700;color:${color}">${value}</span>
    </div>
    <div style="height:8px;background:#e2e8f0;border-radius:6px;overflow:hidden">
      <div style="height:100%;width:${Math.min(100,pct)}%;background:${color};border-radius:6px;transition:width 0.6s ease"></div>
    </div>
  </div>`;
}
function statCard(title,children,th){
  return`<div class="section-card" style="background:${th.card}">
    <div class="section-head"><div class="section-title" style="color:${th.txt}">${title}</div></div>
    <div style="padding:16px 18px">${children}</div>
  </div>`;
}
function renderStats(){
  const th=TH;
  // Clients
  const totalClients=CLIENTS.length;
  const clientsActifs=CLIENTS.filter(c=>c.status==="actif").length;
  const clientsRelance=CLIENTS.filter(c=>c.status==="relance1"||c.status==="relance2").length;
  const clientsInactifs=CLIENTS.filter(c=>c.status==="inactif").length;
  const caTotal=CLIENTS.reduce((s,c)=>s+c.ca,0);
  // Devis
  const totalDevis=DEVIS.length;
  const devisAcceptes=DEVIS.filter(d=>d.statut==="accepte").length;
  const devisEnvoyes=DEVIS.filter(d=>d.statut==="envoye").length;
  const devisRefuses=DEVIS.filter(d=>d.statut==="refuse").length;
  const caDevisAcceptes=DEVIS.filter(d=>d.statut==="accepte").reduce((s,d)=>s+d.montantHT*(1+d.tva/100),0);
  const txConversion=totalDevis>0?Math.round(devisAcceptes/totalDevis*100):0;
  // Planning
  const totalEvents=EVENTS.length;
  const rdvCount=EVENTS.filter(e=>e.type==="rdv").length;
  const chantierCount=EVENTS.filter(e=>e.type==="chantier").length;
  const prospCount=EVENTS.filter(e=>e.type==="prospection").length;
  const evCeMois=EVENTS.filter(e=>e.date.slice(0,7)===TODAY.slice(0,7)).length;
  // Stock
  const stockAlertes=STOCK.filter(s=>s.qte<s.seuil).length;
  const stockOK=STOCK.filter(s=>s.qte>=s.seuil).length;
  const valeurStock=STOCK.reduce((s,p)=>s+p.qte*p.prix,0);
  // Factures
  const facRetard=FACTURES.filter(f=>f.statut==="retard").length;
  const facPayees=FACTURES.filter(f=>f.statut==="payee").length;
  const caEncaisse=FACTURES.filter(f=>f.statut==="payee").reduce((s,f)=>s+f.ttc,0);
  const caEnAttente=FACTURES.filter(f=>["envoyee","retard"].includes(f.statut)).reduce((s,f)=>s+f.ttc,0);
  // Taches
  const tachesDone=TACHES.filter(t=>t.done).length;
  const tachesTodo=TACHES.filter(t=>!t.done).length;
  const tachesUrgentes=TACHES.filter(t=>!t.done&&t.prio==="haute").length;

  return`
    <!-- KPIs globaux -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      ${kpi("CA total clients",fMoney(caTotal),th.c1,true)}
      ${kpi("CA encaissé",fMoney(caEncaisse),"#15803d",true)}
      ${kpi("CA en attente",fMoney(caEnAttente),"#b45309",true)}
      ${kpi("Tx conversion devis",txConversion+"%",th.c2)}
    </div>

    <div class="two-col" style="margin-bottom:16px">
      <!-- Clients -->
      ${statCard("👥 Clients",`
        ${bar(clientsActifs/totalClients*100,th.c1,"Actifs",clientsActifs+" / "+totalClients)}
        ${bar(clientsRelance/totalClients*100,"#b45309","À relancer",clientsRelance)}
        ${bar(clientsInactifs/totalClients*100,"#991b1b","Inactifs",clientsInactifs)}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="text-align:center;padding:10px;background:${th.c1}10;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:${th.c1}">${totalClients}</div>
            <div style="font-size:11px;color:#64748b">Total clients</div>
          </div>
          <div style="text-align:center;padding:10px;background:#15803d10;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:#15803d">${fMoney(caTotal)}</div>
            <div style="font-size:11px;color:#64748b">CA total</div>
          </div>
        </div>`,th)}

      <!-- Devis -->
      ${statCard("📋 Devis",`
        ${bar(devisAcceptes/Math.max(1,totalDevis)*100,"#15803d","Acceptés",devisAcceptes+" / "+totalDevis)}
        ${bar(devisEnvoyes/Math.max(1,totalDevis)*100,th.c1,"En attente réponse",devisEnvoyes)}
        ${bar(devisRefuses/Math.max(1,totalDevis)*100,"#991b1b","Refusés",devisRefuses)}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="text-align:center;padding:10px;background:#15803d10;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:#15803d">${txConversion}%</div>
            <div style="font-size:11px;color:#64748b">Taux de conversion</div>
          </div>
          <div style="text-align:center;padding:10px;background:${th.c1}10;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:${th.c1}">${fMoney(caDevisAcceptes)}</div>
            <div style="font-size:11px;color:#64748b">CA devis acceptés</div>
          </div>
        </div>`,th)}
    </div>

    <div class="two-col" style="margin-bottom:16px">
      <!-- Planning / Chantiers -->
      ${statCard("📅 Planning & Chantiers",`
        ${bar(rdvCount/Math.max(1,totalEvents)*100,th.c2,"RDV clients",rdvCount+" événements")}
        ${bar(chantierCount/Math.max(1,totalEvents)*100,"#b08d57","Chantiers",chantierCount+" événements")}
        ${bar(prospCount/Math.max(1,totalEvents)*100,th.c1,"Prospections",prospCount+" événements")}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;color:#64748b">Événements ce mois</div>
          <div style="font-size:22px;font-weight:700;color:${th.c1}">${evCeMois}</div>
        </div>`,th)}

      <!-- Factures -->
      ${statCard("🧾 Facturation",`
        ${bar(facPayees/Math.max(1,FACTURES.length)*100,"#15803d","Factures payées",facPayees+" / "+FACTURES.length)}
        ${bar(facRetard/Math.max(1,FACTURES.length)*100,"#991b1b","En retard",facRetard)}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9;display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="text-align:center;padding:10px;background:#15803d10;border-radius:8px">
            <div style="font-size:18px;font-weight:700;color:#15803d">${fMoney(caEncaisse)}</div>
            <div style="font-size:11px;color:#64748b">CA encaissé</div>
          </div>
          <div style="text-align:center;padding:10px;background:#b4530910;border-radius:8px">
            <div style="font-size:18px;font-weight:700;color:#b45309">${fMoney(caEnAttente)}</div>
            <div style="font-size:11px;color:#64748b">En attente</div>
          </div>
        </div>`,th)}
    </div>

    <div class="two-col">
      <!-- Stock -->
      ${statCard("📦 Stock",`
        ${bar(stockOK/Math.max(1,STOCK.length)*100,"#15803d","Références OK",stockOK+" / "+STOCK.length)}
        ${bar(stockAlertes/Math.max(1,STOCK.length)*100,"#991b1b","En alerte / rupture",stockAlertes)}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;color:#64748b">Valeur totale du stock</div>
          <div style="font-size:20px;font-weight:700;color:${th.c1}">${fMoney(valeurStock)}</div>
        </div>`,th)}

      <!-- Tâches -->
      ${statCard("✅ Tâches & Échéances",`
        ${bar(tachesDone/Math.max(1,TACHES.length)*100,"#15803d","Terminées",tachesDone+" / "+TACHES.length)}
        ${bar(tachesTodo/Math.max(1,TACHES.length)*100,th.c1,"En cours",tachesTodo)}
        ${bar(tachesUrgentes/Math.max(1,TACHES.length)*100,"#991b1b","Urgentes (haute priorité)",tachesUrgentes)}
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:13px;color:#64748b">Taux de complétion</div>
          <div style="font-size:22px;font-weight:700;color:#15803d">${TACHES.length>0?Math.round(tachesDone/TACHES.length*100):0}%</div>
        </div>`,th)}
    </div>

    <!-- Pipeline -->
    <div class="section-card" style="background:${th.card};margin-bottom:16px">
      <div class="section-head" style="cursor:pointer" onclick="goTo('pipeline')">
        <div><div class="section-title" style="color:${th.txt}">🎯 Pipeline Prospects</div><div class="section-sub">${PROSPECTS.length} prospects · cliquer pour ouvrir →</div></div>
      </div>
      <div style="padding:16px 18px">
        <!-- KPIs pipeline -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
          ${(()=>{const ps=pipeStats();return[
            `<div style="text-align:center;padding:12px;background:${th.c1}10;border-radius:10px"><div style="font-size:22px;font-weight:700;color:${th.c1}">${ps.total}</div><div style="font-size:11px;color:#64748b;margin-top:2px">Total prospects</div></div>`,
            `<div style="text-align:center;padding:12px;background:#e67e2210;border-radius:10px"><div style="font-size:16px;font-weight:700;color:#e67e22">${fMoney(ps.pipeline)}</div><div style="font-size:11px;color:#64748b;margin-top:2px">Pipeline actif</div></div>`,
            `<div style="text-align:center;padding:12px;background:#27ae6010;border-radius:10px"><div style="font-size:16px;font-weight:700;color:#27ae60">${fMoney(ps.wonAmt)}</div><div style="font-size:11px;color:#64748b;margin-top:2px">CA gagné</div></div>`,
            `<div style="text-align:center;padding:12px;background:#c0392b10;border-radius:10px"><div style="font-size:22px;font-weight:700;color:#c0392b">${ps.txConv}%</div><div style="font-size:11px;color:#64748b;margin-top:2px">Taux de conv.</div></div>`,
          ].join("");})()}
        </div>
        <!-- Barres par étape -->
        <div style="margin-bottom:6px;font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em">Répartition par étape</div>
        ${PIPE_STAGES.map(s=>{
          const n=PROSPECTS.filter(p=>p.stage===s.id).length;
          const amt=PROSPECTS.filter(p=>p.stage===s.id).reduce((x,p)=>x+p.amount,0);
          return bar(n/Math.max(1,PROSPECTS.length)*100,s.color,s.label,n+" prospect"+(n>1?"s":"")+(amt?" · "+fMoney(amt):""));
        }).join("")}
      </div>
    </div>
  `;
}

function previewAvatar(ev){
  const file=ev.target.files[0];if(!file)return;
  if(file.size>500000){alert("Image trop lourde (max 500 Ko)");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById("u-avatar").value=e.target.result;
    const prev=document.getElementById("u-avatar-preview");
    if(prev)prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover"/>`;
  };
  reader.readAsDataURL(file);
}
function updateAvatarInitial(name){
  const prev=document.getElementById("u-avatar-preview");
  const av=document.getElementById("u-avatar");
  if(prev&&av&&!av.value){prev.textContent=name?name.charAt(0).toUpperCase():"?";}
}
async function saveUser(id){
  const nom=document.getElementById("u-nom").value.trim();
  const login=document.getElementById("u-login").value.trim();
  const pwd=document.getElementById("u-pwd").value.trim();
  const role=document.getElementById("u-role").value;
  const email=document.getElementById("u-email").value.trim();
  const tel=document.getElementById("u-tel").value.trim();
  const poste=document.getElementById("u-poste").value.trim();
  const avatar=document.getElementById("u-avatar").value;
  const actif=document.getElementById("u-actif").value==="true";
  if(!nom||!login){alert("Nom et identifiant obligatoires");return;}
  if(!id&&!pwd){alert("Mot de passe obligatoire pour un nouvel utilisateur");return;}
  const existing=USERS.find(u=>u.login===login&&u.id!==id);
  if(existing){alert("Cet identifiant est déjà utilisé");return;}
  if(id){
    const idx=USERS.findIndex(u=>u.id===id);
    if(idx!==-1){
      const updated={...USERS[idx],nom,login,role,email,tel,poste,avatar,actif};
      if(pwd)updated.passHash=await hashPassword(pwd);
      USERS[idx]=updated;
      logActivity("Modification utilisateur",`Profil de ${nom} mis à jour`);
      if(currentUser&&currentUser.id===id){
        currentUser={...currentUser,nom,login,role,email,tel,poste,avatar};
        sessionStorage.setItem("gp_user",JSON.stringify(currentUser));
      }
    }
  } else {
    const passHash=await hashPassword(pwd);
    USERS.push({id:uid(),nom,login,passHash,role,email,tel,poste,avatar,actif,creeLe:TODAY});
    logActivity("Création utilisateur",`Nouvel utilisateur : ${nom} (${role})`);
  }
  closeModal();
  renderPanel();
  renderNav();
}
function delUser(id){
  if(USERS.length<=1){alert("Impossible de supprimer le dernier utilisateur");return;}
  const u=USERS.find(x=>x.id===id);
  confirmDel("Supprimer cet utilisateur ?",function(){
    const idx=USERS.findIndex(x=>x.id===id);
    if(idx!==-1)USERS.splice(idx,1);
    logActivity("Suppression utilisateur",`${u?u.nom:"Utilisateur"} supprimé`);
    renderPanel();
  });
}

function bindPanel(){
  window.applyPreset=function(i){const p=PRESETS[i];Object.assign(TH,{c1:p.c1,c2:p.c2,sidebar:p.sb,bg:p.bg,card:p.card,txt:p.txt,sand:p.sand});applyTheme();renderNav();renderPanel();};
  window.handleLogo=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{TH.logo=ev.target.result;applyTheme();renderPanel();};r.readAsDataURL(f);};
  window.dragStart=function(i){dragIdx=i;};
  window.dragOver=function(e,i){e.preventDefault();if(dragIdx===null||dragIdx===i)return;const sorted=[...RUBS].sort((a,b)=>a.ordre-b.ordre);const[m]=sorted.splice(dragIdx,1);sorted.splice(i,0,m);RUBS=sorted.map((r,idx)=>({...r,ordre:idx}));dragIdx=i;renderPanel();};
  window.dragEnd=function(){dragIdx=null;};
  window.toggleEmojiPicker=function(id){emojiPickerOpen=emojiPickerOpen===id?null:id;renderPanel();};
  window.setRubIcon=function(id,em){RUBS=RUBS.map(r=>r.id===id?{...r,icon:em}:r);emojiPickerOpen=null;renderPanel();};
  window.setRubLabel=function(id,v){RUBS=RUBS.map(r=>r.id===id?{...r,label:v}:r);};
  window.toggleRub=function(id){RUBS=RUBS.map(r=>r.id===id&&r.id!=="db"?{...r,actif:!r.actif}:r);renderPanel();};
}

function setSidebarVisuals(open){
  const labels=document.querySelectorAll(".sidebar-label");
  const appName=document.getElementById("app-name");
  const appSub=document.getElementById("app-sub");
  const div=document.getElementById("sidebar-divider");
  const logo=document.getElementById("logo-placeholder")||document.getElementById("logo-img");
  const bot=document.getElementById("sidebar-bottom");
  const v=open?"1":"0";
  labels.forEach(l=>{l.style.opacity=v;l.style.maxWidth=open?"200px":"0";});
  if(appName){appName.style.opacity=v;appName.style.maxHeight=open?"40px":"0";}
  if(appSub){appSub.style.opacity=v;appSub.style.maxHeight=open?"30px":"0";}
  if(div)div.style.opacity=v;
  if(logo){logo.style.opacity=v;logo.style.maxHeight=open?"70px":"0";}
  if(bot)bot.style.opacity=v;
}

// Réduction/expansion sur DESKTOP uniquement (bouton ☰ dans la sidebar)
function toggleSidebar(){
  if(window.innerWidth<=768) return;
  document.getElementById("app-screen").classList.toggle("collapsed");
}

// Applique le bon layout selon la largeur d'écran
function applyLayout(){
  const sb=document.getElementById("sidebar");
  const main=document.getElementById("main");
  const app=document.getElementById("app-screen");
  if(window.innerWidth<=768){
    // MOBILE : effacer styles inline, retirer collapsed, laisser le CSS gérer
    sb.style.width="";
    main.style.marginLeft="";
    sb.classList.remove("open");
    if(app)app.classList.remove("collapsed");
    const ov=document.getElementById("sidebar-overlay");
    if(ov)ov.classList.remove("open");
    setSidebarVisuals(true);
  } else {
    // DESKTOP/TABLETTE : effacer les inline pour laisser le CSS gérer
    sb.style.width="";
    main.style.marginLeft="";
  }
}

function initSidebar(){ applyLayout(); }

  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(applyLayout,150);
});
