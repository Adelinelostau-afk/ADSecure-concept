<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>AD Secure Concept — Espace Administrateur</title>
<!-- ══ PWA — Application installable ══ -->
<meta name="theme-color" content="#1A2118"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AD Secure"/>
<meta name="mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══ DESIGN TOKENS — alignés sur le site vitrine ══════════════════════════ */
:root{
  --nuit:#1A2118;
  --teal1:#3286A0;
  --teal2:#299AC3;
  --sand:#DED3BC;
  --cream:#F7F4ED;
  --paper:#FFFFFF;
  --ink:rgba(26,33,24,1);
  --ink2:rgba(26,33,24,0.62);
  --ink3:rgba(26,33,24,0.38);
  --line:rgba(26,33,24,0.1);
  --line-med:rgba(26,33,24,0.15);
  --display:'Lora',Georgia,serif;
  --body:'Inter',-apple-system,sans-serif;
  --sidebar-w:240px;
  --sidebar-collapsed:60px;
  --topbar-h:60px;
  --radius:14px;
  --shadow:0 1px 3px rgba(26,33,24,0.08),0 4px 16px rgba(26,33,24,0.04);
  --shadow-md:0 8px 32px rgba(26,33,24,0.12);
}

/* ══ RESET ════════════════════════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;overflow-x:hidden;width:100%;}
body{font-family:var(--body);background:#F7F4ED;color:#1A2118;min-height:100vh;width:100%;max-width:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#app-screen{background:#F7F4ED;min-height:100vh;width:100%;max-width:100%;overflow-x:hidden;position:relative;}
a{color:inherit;text-decoration:none;}
img{max-width:100%;display:block;}
button{font-family:var(--body);}

/* ══ SIDEBAR ══════════════════════════════════════════════════════════════ */
#sidebar{
  width:var(--sidebar-w);
  background:var(--nuit);
  display:flex;flex-direction:column;
  position:fixed;top:0;bottom:0;left:0;z-index:200;
  box-shadow:2px 0 24px rgba(0,0,0,0.18);
  transition:width 0.25s ease;
  overflow:hidden;
}
#sidebar-header{
  padding:22px 18px 16px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  text-align:center;
  flex-shrink:0;
}
#logo-placeholder{
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--teal1),var(--teal2));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 10px;font-size:24px;
  transition:opacity 0.2s,max-height 0.25s;overflow:hidden;
}
#app-name{
  font-family:var(--display);color:var(--sand);
  font-weight:700;font-size:17px;line-height:1.2;
  transition:opacity 0.2s,max-height 0.2s;overflow:hidden;
}
#app-sub{
  color:var(--teal2);font-size:10px;
  letter-spacing:0.2em;text-transform:uppercase;
  margin-top:3px;
  transition:opacity 0.2s,max-height 0.2s;overflow:hidden;
}
#sidebar-divider{
  width:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--teal1),transparent);
  margin:10px auto 0;
  transition:opacity 0.2s;
}
#nav{flex:1;padding:10px 8px;overflow-y:auto;}
#nav::-webkit-scrollbar{width:3px;}
#nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:9px;border:none;
  background:transparent;color:rgba(222,211,188,0.48);
  cursor:pointer;font-size:13px;font-weight:500;
  margin-bottom:2px;text-align:left;
  font-family:var(--body);
  transition:all 0.15s;white-space:nowrap;overflow:hidden;
}
.nav-btn:hover{background:rgba(255,255,255,0.06);color:rgba(222,211,188,0.88);}
.nav-btn.active{
  background:rgba(50,134,160,0.22);
  color:var(--teal2);font-weight:700;
}
.nav-badge{
  background:#ef4444;color:#fff;
  font-size:10px;font-weight:800;
  padding:1px 6px;border-radius:10px;margin-left:auto;flex-shrink:0;
}
.sidebar-label{transition:opacity 0.2s,max-width 0.2s;white-space:nowrap;overflow:hidden;flex:1;}
#sidebar-bottom{
  padding:8px 8px 12px;
  border-top:1px solid rgba(255,255,255,0.06);
  display:flex;flex-direction:column;gap:2px;
  flex-shrink:0;
  transition:opacity 0.2s;
}
#sidebar-toggle{
  width:32px;height:32px;border-radius:7px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:all 0.2s;
  color:rgba(222,211,188,0.6);flex-shrink:0;
}
#sidebar-toggle:hover{background:rgba(255,255,255,0.12);color:var(--sand);}

/* ══ MAIN ═════════════════════════════════════════════════════════════════ */
#main{margin-left:240px;min-height:100vh;transition:margin-left 0.25s ease;}
@media(min-width:769px) and (max-width:1100px){#main{margin-left:200px!important;}#sidebar{width:200px!important;}}

/* ══ TOPBAR ═══════════════════════════════════════════════════════════════ */
#topbar{
  background:rgba(247,244,237,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  padding:0 24px 0 20px;
  height:var(--topbar-h);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  gap:12px;
}
#page-title{
  font-family:var(--display);font-size:16px;font-weight:700;
  color:var(--nuit);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#topbar-right{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:rgba(50,134,160,0.1);
  border:1.5px solid rgba(50,134,160,0.2);
  cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;color:var(--teal1);
}
.icon-btn:hover{background:var(--nuit);color:#fff;border-color:var(--nuit);}
#alert-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:999px;
  border:1.5px solid #fca5a5;background:#fef2f2;
  color:#991b1b;cursor:pointer;font-weight:700;font-size:12px;
  transition:all 0.2s;
}
#alert-btn:hover{background:#fee2e2;}
#burger-btn{
  display:none;width:38px;height:38px;border-radius:9px;
  border:1.5px solid var(--line-med);background:var(--paper);
  align-items:center;justify-content:center;
  cursor:pointer;font-size:17px;flex-shrink:0;
  color:var(--nuit);
}
#back-btn{
  width:34px;height:34px;border-radius:9px;
  border:1.5px solid var(--line);background:var(--paper);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--ink2);transition:all 0.2s;
}
#back-btn:hover{background:var(--cream);border-color:var(--line-med);}

/* ══ CONTENT ══════════════════════════════════════════════════════════════ */
#content{padding:28px 32px;background:#F7F4ED;min-height:calc(100vh - 60px);}
#main{background:#F7F4ED;}

/* ══ KPI CARDS ════════════════════════════════════════════════════════════ */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi{
  background:#FFFFFF;border-radius:var(--radius);
  padding:16px 20px;border:1px solid rgba(26,33,24,0.1);
  box-shadow:var(--shadow);
  transition:box-shadow 0.2s,transform 0.2s;
}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.kpi-label{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.08em;margin-bottom:8px;color:rgba(26,33,24,0.38);
}
.kpi-value{font-family:var(--display);font-size:28px;font-weight:700;line-height:1;}
.kpi-value.small{font-size:18px;}

/* ══ SECTION CARDS ════════════════════════════════════════════════════════ */
.section-card{
  background:#FFFFFF;border-radius:var(--radius);
  border:1px solid rgba(26,33,24,0.1);overflow:hidden;
  margin-bottom:18px;box-shadow:var(--shadow);
}
.section-head{
  padding:16px 20px 14px;
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px;
}
.section-title{
  font-family:var(--display);font-weight:700;font-size:15px;color:var(--nuit);
}
.section-sub{font-size:11px;color:var(--ink3);margin-top:2px;}

/* ══ LAYOUT ═══════════════════════════════════════════════════════════════ */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}

/* ══ BADGE ════════════════════════════════════════════════════════════════ */
.badge{
  font-size:11px;font-weight:700;padding:3px 9px;
  border-radius:999px;white-space:nowrap;
}

/* ══ BUTTONS ══════════════════════════════════════════════════════════════ */
.btn-add{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:999px;border:none;
  cursor:pointer;font-size:13px;font-weight:700;
  font-family:var(--body);transition:all 0.2s;
}
.btn-add:hover{transform:translateY(-1px);filter:brightness(1.08);}
.btn-sm{
  padding:5px 10px;border-radius:7px;
  border:1.5px solid var(--line-med);
  background:var(--cream);cursor:pointer;font-size:12px;
  font-family:var(--body);transition:all 0.15s;color:var(--ink2);
}
.btn-sm:hover{background:var(--paper);border-color:var(--teal1);color:var(--teal1);}
.btn-danger{border-color:#fecaca!important;background:#fef2f2!important;color:#991b1b!important;}
.btn-danger:hover{background:#fee2e2!important;border-color:#f87171!important;}
.btn-edit{border-color:#bfdbfe!important;background:#eff6ff!important;color:#1d4ed8!important;}
.btn-edit:hover{background:#dbeafe!important;}

/* ══ TABLES ═══════════════════════════════════════════════════════════════ */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  padding:11px 18px;text-align:left;
  font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:0.07em;white-space:nowrap;
  border-bottom:1px solid var(--line);
  color:var(--ink3);background:var(--cream);
}
td{
  padding:12px 18px;
  border-bottom:1px solid rgba(26,33,24,0.06);
  color:var(--ink);
}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(50,134,160,0.03);}

/* ══ HERO DASHBOARD ══════════════════════════════════════════════════════ */
.db-hero{
  border-radius:20px;padding:28px 32px;margin-bottom:22px;
  color:#fff;position:relative;overflow:hidden;
}
.db-hero::before{
  content:"";position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg width='400' height='200' viewBox='0 0 400 200' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='350' cy='50' r='180' fill='rgba(255,255,255,0.04)'/%3E%3Ccircle cx='380' cy='160' r='100' fill='rgba(255,255,255,0.03)'/%3E%3C/svg%3E") right center no-repeat;
  pointer-events:none;
}
.hero-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:20px;}
.hero-kpi{
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:11px;padding:12px 14px;cursor:pointer;
  transition:background 0.15s;
}
.hero-kpi:hover{background:rgba(255,255,255,0.16);}
.hero-kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;opacity:0.65;font-weight:600;}
.hero-kpi-value{font-family:var(--display);font-size:22px;font-weight:700;}

/* ══ ALERT BARS ═══════════════════════════════════════════════════════════ */
.alert-bar{
  border-radius:12px;padding:13px 18px;
  display:flex;gap:12px;align-items:center;
  cursor:pointer;margin-bottom:12px;
  border:1.5px solid;
  transition:filter 0.2s;
}
.alert-bar:hover{filter:brightness(0.97);}

/* ══ PLANNING ═════════════════════════════════════════════════════════════ */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 10px 16px;}
.day-col{padding:4px;}
.day-header{text-align:center;margin-bottom:8px;}
.day-name{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--ink3);}
.day-num{
  width:28px;height:28px;border-radius:50%;
  font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  margin:2px auto;color:var(--ink);
}
.day-num.today{background:var(--teal1);color:#fff;}
.ev-pill{
  border-left:3px solid;border-radius:6px;
  padding:4px 6px;margin-bottom:3px;cursor:pointer;
  position:relative;
}
.ev-title{font-weight:700;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-size:10px;color:var(--ink3);}
.ev-del{position:absolute;top:2px;right:2px;font-size:10px;cursor:pointer;opacity:0.6;display:none;}
.ev-pill:hover .ev-del{display:block;}

/* ══ STOCK ════════════════════════════════════════════════════════════════ */
.stock-bar-bg{height:4px;border-radius:3px;background:var(--line);margin-top:4px;}
.stock-bar{height:100%;border-radius:3px;}

/* ══ TACHES ══════════════════════════════════════════════════════════════ */
.tache-row{
  padding:10px 20px;border-bottom:1px solid rgba(26,33,24,0.06);
  display:flex;gap:10px;align-items:center;
}
.tache-row:last-child{border-bottom:none;}
.tache-check{
  width:18px;height:18px;border-radius:5px;
  border:2px solid var(--line-med);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:10px;color:#fff;background:transparent;
  transition:all 0.15s;
}
.tache-check:hover{border-color:var(--teal1);}
.tache-check.done{background:#15803d;border-color:#15803d;}
.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ══ QUICK GRID ══════════════════════════════════════════════════════════ */
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.quick-btn{
  background:var(--paper);border-radius:var(--radius);
  padding:20px;cursor:pointer;text-align:left;
  width:100%;transition:all 0.18s;
  font-family:var(--body);border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.quick-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:rgba(50,134,160,0.25);}

/* ══ CMD ROWS ════════════════════════════════════════════════════════════ */
.cmd-row{
  padding:12px 20px;border-bottom:1px solid rgba(26,33,24,0.06);
  display:flex;justify-content:space-between;align-items:center;
}
.cmd-row:last-child{border-bottom:none;}

/* ══ LOGIN ════════════════════════════════════════════════════════════════ */
#login-screen{
  min-height:100vh;width:100%;
  align-items:center;justify-content:center;
  background:#1A2118;
  position:relative;overflow:auto;
}
#login-screen::before{
  content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 900px 600px at 75% 40%,rgba(50,134,160,0.25),transparent 65%),
             radial-gradient(ellipse 500px 500px at 20% 80%,rgba(41,154,195,0.12),transparent 60%);
  pointer-events:none;
}
.login-card{
  background:var(--paper);border-radius:24px;
  padding:40px 32px;width:100%;max-width:420px;
  box-shadow:0 32px 80px rgba(0,0,0,0.3);
  margin:20px;box-sizing:border-box;
  position:relative;z-index:1;
}
.login-card .eyebrow{
  display:flex;align-items:center;gap:9px;
  font-size:10.5px;font-weight:700;letter-spacing:0.16em;
  text-transform:uppercase;color:var(--teal1);margin-bottom:6px;
}
.login-card .eyebrow::before{
  content:"";width:6px;height:6px;border-radius:50%;
  background:var(--teal2);box-shadow:0 0 0 3px rgba(41,154,195,0.18);
  flex-shrink:0;
}

/* ══ MODAL ════════════════════════════════════════════════════════════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(26,33,24,0.45);
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(4px);
}
.modal{
  background:var(--paper);border-radius:20px;
  width:100%;max-width:520px;max-height:90vh;
  overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.2);
}
.modal-head{
  padding:20px 24px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--paper);z-index:1;
}
.modal-title{font-family:var(--display);font-weight:700;font-size:16px;color:var(--nuit);}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink3);transition:color 0.2s;}
.modal-close:hover{color:var(--nuit);}
.modal-body{padding:22px 24px;}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--line);
  display:flex;gap:8px;justify-content:flex-end;
}
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:700;color:var(--ink3);
  text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px;
}
.field input,.field select,.field textarea{
  width:100%;padding:10px 14px;border-radius:10px;
  border:1.5px solid var(--line-med);font-size:13.5px;
  color:var(--nuit);background:var(--cream);outline:none;
  font-family:var(--body);box-sizing:border-box;transition:border-color 0.2s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--teal1);background:var(--paper);
}
.field textarea{min-height:80px;resize:vertical;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn-save{
  padding:10px 22px;border-radius:999px;border:none;
  cursor:pointer;font-weight:700;font-size:13px;
  font-family:var(--body);color:#fff;transition:all 0.2s;
}
.btn-save:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-cancel{
  padding:10px 22px;border-radius:999px;
  border:1.5px solid var(--line-med);background:var(--paper);
  color:var(--ink2);cursor:pointer;font-weight:600;font-size:13px;
  font-family:var(--body);transition:all 0.2s;
}
.btn-cancel:hover{border-color:var(--nuit);color:var(--nuit);}

/* ══ PANEL ════════════════════════════════════════════════════════════════ */
.panel-overlay{position:fixed;inset:0;z-index:500;display:flex;justify-content:flex-end;}
.panel-bg{position:absolute;inset:0;background:rgba(26,33,24,0.3);backdrop-filter:blur(2px);}
.panel{
  position:relative;width:360px;height:100vh;
  background:var(--paper);overflow-y:auto;
  display:flex;flex-direction:column;
  box-shadow:-8px 0 40px rgba(0,0,0,0.12);
}
.panel-head{
  padding:20px 24px;border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;background:var(--paper);z-index:1;
}
.panel-title{font-family:var(--display);font-weight:700;font-size:15px;color:var(--nuit);}
.panel-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink3);}
.panel-body{padding:20px 24px;flex:1;}
.panel-footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:8px;}
.field-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;display:block;}
input[type=text],input[type=color],input[type=number],input[type=date],input[type=time],select,textarea{font-family:var(--body);}
.color-row{display:flex;gap:8px;align-items:center;}
.color-row input[type=text]{flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid var(--line-med);font-size:13px;color:var(--nuit);background:var(--cream);outline:none;box-sizing:border-box;}
input[type=color]{width:44px;height:34px;padding:2px;cursor:pointer;border-radius:8px;border:1.5px solid var(--line-med);}
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}

// ── Hashage SHA-256 (API native du navigateur) avec fallback ────────────────
async function hashPassword(pwd){
  try{
    if(crypto && crypto.subtle){
      const data=new TextEncoder().encode(pwd);
      const buf=await crypto.subtle.digest("SHA-256",data);
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
  }catch(e){ console.warn("crypto.subtle indisponible, fallback simple"); }
  // Fallback simple (si crypto.subtle indisponible) — moins sûr mais fonctionnel
  let h=0;for(let i=0;i<pwd.length;i++){h=((h<<5)-h+pwd.charCodeAt(i))|0;}
  return "fb_"+Math.abs(h).toString(16);
}

// ── Journal d'activité ──────────────────────────────────────────────────────
let JOURNAL=[];
function logActivity(action,details){
  JOURNAL.unshift({
    id:uid(),
    ts:new Date().toISOString(),
    user:currentUser?currentUser.nom:"Système",
    login:currentUser?currentUser.login:"—",
    action,
    details:details||""
  });
  if(JOURNAL.length>200) JOURNAL=JOURNAL.slice(0,200); // garder les 200 derniers
  saveData();
}

function checkLogin(){
  const saved=sessionStorage.getItem("gp_user");
  if(saved){currentUser=JSON.parse(saved);isLoggedIn=true;return true;}
  return false;
}
async function doLogin(){
  const login=document.getElementById("login-input").value.trim();
  const pwd=document.getElementById("pwd-input").value.trim();
  const err=document.getElementById("login-error");
  // Récupérer la liste des utilisateurs à jour depuis le cloud avant de vérifier
  err.textContent="Vérification…";err.style.display="block";err.style.color="#64748b";err.style.background="#f1f5f9";err.style.borderColor="#cbd5e1";
  await syncPull();
  err.style.display="none";err.style.color="";err.style.background="";err.style.borderColor="";
  const hash=await hashPassword(pwd);
  // Accepte le nouveau format (passHash) ET l'ancien format (password en clair, pour migration)
  const u=USERS.find(x=>x.login===login&&(x.passHash===hash||x.password===pwd));
  if(u && u.actif!==false){
    // Migration : si l'utilisateur avait l'ancien format, on le convertit
    if(!u.passHash && u.password){
      u.passHash=hash;
      delete u.password;
      saveData();
    }
    currentUser=u;isLoggedIn=true;
    sessionStorage.setItem("gp_user",JSON.stringify(u));
    logActivity("Connexion","Connexion réussie");
    document.getElementById("login-screen").style.display="none";
    document.getElementById("app-screen").style.display="flex";
    applyTheme();
    initSidebar();
    renderNav();renderPage();
    // Récupérer les données du cloud après connexion
    syncPull().then(ok=>{ if(ok){ applyTheme(); renderNav(); renderPage(); } });
  } else if(u && u.actif===false){
    err.textContent="Ce compte est désactivé";err.style.display="block";
    document.getElementById("pwd-input").value="";
  } else {
    err.textContent="Identifiants incorrects";err.style.display="block";
    document.getElementById("pwd-input").value="";
  }
}
function doLogout(){
  logActivity("Déconnexion","");

  document.getElementById("login-input").value="";
  document.getElementById("pwd-input").value="";
  document.getElementById("login-error").style.display="none";
}

// Helpers de calcul facture (compatibles avec anciennes factures à montant global)
function facTauxTVA(f){ return (f.tva!==undefined&&f.tva!==null)?f.tva:20; }
function facHT(f){
  if(f.lignes&&f.lignes.length) return f.lignes.reduce((s,l)=>s+(l.qte||0)*(l.pu||0),0);
  return Math.round((f.ttc||0)/(1+(facTauxTVA(f)/100))); // rétrocompat : déduit le HT du TTC
}
function facTVA(f){ return facHT(f)*(facTauxTVA(f)/100); }
function facTTC(f){
  if(f.lignes&&f.lignes.length) return facHT(f)+facTVA(f);
  return f.ttc||0; // ancienne facture : on garde le ttc stocké
}
// Helpers paiements
function facPaye(f){ return (f.paiements||[]).reduce((s,p)=>s+(p.montant||0),0); }
function facReste(f){ return Math.max(0,Math.round((facTTC(f)-facPaye(f))*100)/100); }
function facEstPayee(f){ return facReste(f)<=0 && facTTC(f)>0; }
// Détermine le statut réel d'une facture selon ses paiements et son échéance
function facStatutReel(f){
  if(f.statut==="brouillon"||f.statut==="annulee") return f.statut;
  if(facEstPayee(f)) return "payee";
  if(facPaye(f)>0) return "partiel";
  if(f.ech && f.ech<getToday()) return "retard";
  return "envoyee";
}

(function setupPWA(){
  try{

    const manifest={

      short_name:"AD Secure",

      ]
    };
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    const link=document.createElement("link");
    link.rel="manifest";
    link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);

    // Service worker minimal (cache de l'app pour fonctionnement hors-ligne)
    if("serviceWorker" in navigator){
      const swCode=`
        const CACHE="adsecure-v1";
        self.addEventListener("install",e=>{self.skipWaiting();});
        self.addEventListener("activate",e=>{e.waitUntil(clients.claim());});
        self.addEventListener("fetch",e=>{
          if(e.request.method!=="GET")return;
          e.respondWith(
            fetch(e.request).then(res=>{
              const copy=res.clone();
              caches.open(CACHE).then(c=>c.put(e.request,copy)).catch(()=>{});
              return res;
            }).catch(()=>caches.match(e.request))
          );
        });
      `;
      const swBlob=new Blob([swCode],{type:"application/javascript"});
      const swUrl=URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(err=>console.warn("SW non enregistré:",err));
    }
  }catch(e){ console.warn("PWA setup échec:",e); }
})();

// Envoyer les données vers Supabase
async function syncPush(){
  setSyncBadge("syncing");
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${SYNC_ROW_ID}`,{
      method:"PATCH",
      headers:{
        "apikey":SUPABASE_KEY,
        "Authorization":`Bearer ${SUPABASE_KEY}`,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body:JSON.stringify({data:getDataObject(),updated_at:new Date().toISOString()})
    });
    if(res.status===404 || res.status===204){
      // La ligne n'existe pas encore → on la crée
      if(res.status===404) await syncInsert();
    }
    if(!res.ok && res.status!==204){
      // Tenter une insertion si patch échoue
      await syncInsert();
    }
    setSyncBadge("ok");
    return true;
  }catch(e){
    console.warn("Sync push échec:",e);
    setSyncBadge("offline");
    return false;
  }
}
async function syncInsert(){
  const res=await fetch(`${SUPABASE_URL}/rest/v1/app_data`,{
    method:"POST",
    headers:{
      "apikey":SUPABASE_KEY,
      "Authorization":`Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json",
      "Prefer":"return=minimal"
    },
    body:JSON.stringify({id:SYNC_ROW_ID,data:getDataObject(),updated_at:new Date().toISOString()})
  });
  return res.ok;
}

// Récupérer les données depuis Supabase
async function syncPull(){
  setSyncBadge("syncing");
  try{
    const res=await fetch(`${SUPABASE_URL}/rest/v1/app_data?id=eq.${SYNC_ROW_ID}&select=data`,{
      headers:{"apikey":SUPABASE_KEY,"Authorization":`Bearer ${SUPABASE_KEY}`}
    });
    if(!res.ok){setSyncBadge("error");return false;}
    const rows=await res.json();
    if(rows.length>0 && rows[0].data){
      applyDataObject(rows[0].data);
      saveDataLocal();
      setSyncBadge("ok");
      return true;
    }
    // Aucune donnée en ligne → on pousse les données locales
    await syncInsert();
    setSyncBadge("ok");
    return true;
  }catch(e){
    console.warn("Sync pull échec:",e);
    setSyncBadge("offline");
    return false;
  }
}

function exportData(){

    _meta:{app:"AD Secure Concept",version:"1.3.0",exportLe:new Date().toISOString()},
    CLIENTS, EVENTS, STOCK, COMMANDES, FACTURES, TACHES, PROSPECTS,
    TH, RUBS, USERS, JOURNAL, pipeNextId
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const date=new Date().toISOString().split("T")[0];
  a.href=url; a.download=`adsecure-sauvegarde-${date}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  logActivity("Export","Sauvegarde exportée");
}

function importData(ev){
  const file=ev.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.CLIENTS && !d.PROSPECTS){alert("Fichier invalide : ce n'est pas une sauvegarde AD Secure.");return;}
      if(!confirm("Importer cette sauvegarde ? Vos données actuelles seront remplacées.")) return;
      if(d.CLIENTS) CLIENTS=d.CLIENTS;
      if(d.EVENTS) EVENTS=d.EVENTS;
      if(d.STOCK) STOCK=d.STOCK;
      if(d.COMMANDES) COMMANDES=d.COMMANDES;
      if(d.FACTURES) FACTURES=d.FACTURES;
      if(d.TACHES) TACHES=d.TACHES;
      if(d.PROSPECTS) PROSPECTS=d.PROSPECTS;
      if(d.TH) TH=Object.assign({},DEF_TH,d.TH);
      if(d.RUBS) RUBS=d.RUBS;
      if(d.USERS && Array.isArray(d.USERS) && d.USERS.length>0){USERS.length=0;d.USERS.forEach(u=>USERS.push(u));}
      if(d.JOURNAL && Array.isArray(d.JOURNAL)) JOURNAL=d.JOURNAL;
      if(typeof d.pipeNextId==="number") pipeNextId=d.pipeNextId;
      saveData();
      logActivity("Import","Sauvegarde importée");
      alert("Importation réussie ! L'application va se recharger.");
      location.reload();
    }catch(err){
      alert("Erreur lors de la lecture du fichier : "+err.message);
    }
  };
  reader.readAsText(file);
}

function badge(label,bg,color){return `<span class="badge" style="background:${bg};color:${color}">${label}</span>`;}
function alertCount(){return FACTURES.filter(f=>f.statut==="retard").length+STOCK.filter(s=>s.qte<s.seuil).length+TACHES.filter(t=>!t.done&&t.prio==="haute").length;}
function activeRubs(){return [...RUBS].sort((a,b)=>a.ordre-b.ordre).filter(r=>r.actif);}
function kpi(label,value,color,small){return`<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value${small?" small":""}" style="color:${color||TH.c1}">${value}</div></div>`;}
function weekStart(offset){const d=new Date();const day=d.getDay()===0?6:d.getDay()-1;d.setDate(d.getDate()-day+(offset||0)*7);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

function closeSearch(){ document.getElementById("modal-container").innerHTML=""; }
function runSearch(q){
  q=q.toLowerCase().trim();
  const box=document.getElementById("search-results");
  if(!q||q.length<2){box.innerHTML=`<div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px">Tapez au moins 2 caractères</div>`;return;}
  const results=[];
  CLIENTS.forEach(c=>{if([c.nom,c.contact,c.email,c.tel].filter(Boolean).join(" ").toLowerCase().includes(q))results.push({icon:"👥",label:c.nom,sub:(c.contact||"")+" · "+fMoney(c.ca||0),type:"Client",action:`openClientFiche('${c.id}')`});});
  PROSPECTS.forEach(p=>{if([p.name,p.company,p.email].filter(Boolean).join(" ").toLowerCase().includes(q))results.push({icon:"🎯",label:p.name,sub:(p.company||"")+" · "+fMoney(p.amount||0),type:"Prospect",action:`goTo('pipeline')`});});
  FACTURES.forEach(f=>{if([f.num,f.client].filter(Boolean).join(" ").toLowerCase().includes(q))results.push({icon:"🧾",label:f.num,sub:f.client+" · "+fMoney(f.ttc||0),type:"Facture",action:`goTo('admin')`});});
  (typeof COMMANDES!=="undefined"?COMMANDES:[]).forEach(c=>{if([c.ref,c.client,c.fournisseur].filter(Boolean).join(" ").toLowerCase().includes(q))results.push({icon:"📦",label:c.ref||c.client||"Commande",sub:(c.client||c.fournisseur||""),type:"Commande",action:`goTo('stock')`});});
  STOCK.forEach(s=>{if((s.nom||"").toLowerCase().includes(q))results.push({icon:"📦",label:s.nom,sub:"Qté "+s.qte+" · "+fMoney(s.prix||0),type:"Stock",action:`goTo('stock')`});});
  EVENTS.forEach(e=>{if([e.titre,e.client].filter(Boolean).join(" ").toLowerCase().includes(q))results.push({icon:"📅",label:e.titre,sub:(e.client||"")+" · "+(e.date||""),type:"Événement",action:`goTo('plan')`});});
  if(results.length===0){box.innerHTML=`<div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px">Aucun résultat pour "${q}"</div>`;return;}
  box.innerHTML=results.slice(0,30).map(r=>`<button onclick="closeSearch();${r.action}" style="width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border:none;background:none;cursor:pointer;border-radius:9px;text-align:left;font-family:'Inter',sans-serif" onmouseover="this.style.background='#F7F4ED'" onmouseout="this.style.background='none'">
    <span style="font-size:18px;flex-shrink:0">${r.icon}</span>
    <div style="flex:1;min-width:0">
      <div style="font-size:14px;font-weight:600;color:#1A2118">${r.label}</div>
      <div style="font-size:12px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.sub}</div>
    </div>
    <span style="font-size:10px;font-weight:700;color:#94a3b8;background:#f1f5f9;padding:2px 8px;border-radius:10px;flex-shrink:0">${r.type}</span>
  </button>`).join("")+(results.length>30?`<div style="padding:10px;text-align:center;color:#94a3b8;font-size:11px">${results.length-30} autre(s) résultat(s)…</div>`:"");
}

function goTo(id){
  closeSidebar();
  const r=RUBS.find(x=>x.id===id);
  const newPage=(r&&r.actif)?id:"db";
  if(newPage!==currentPage) pageHistory.push(currentPage);
  currentPage=newPage;
  if(newPage!=="client-fiche") selectedClientId=null;
  closeModal();
  renderNav();
  renderPage();
}
function openClientFiche(clientId){
  selectedClientId=clientId;
  pageHistory.push(currentPage);
  currentPage="client-fiche";
  closeModal();
  renderNav();
  renderPage();
}
function goBack(){
  if(pageHistory.length===0) return;
  currentPage=pageHistory.pop();
  renderNav();
  renderPage();
}

let cliDragId=null;
function cliOnDrop(e,statusKey){
  e.preventDefault();
  if(!cliDragId) return;
  CLIENTS=CLIENTS.map(c=>c.id===cliDragId?{...c,status:statusKey}:c);
  cliDragId=null;
  saveData();
  renderPage();renderNav();
}
// ── Drag tactile clients ──────────────────────────────────────
let cliTouchMoved=false;
function cliTouchStart(e,id){
  cliDragId=id;cliTouchMoved=false;
  const card=e.currentTarget;
  card._holdTimer=setTimeout(()=>{
    card.classList.add("dragging");cliTouchMoved=true;
    if(navigator.vibrate)navigator.vibrate(30);
  },180);
}
function cliTouchMove(e){
  if(!cliDragId||!cliTouchMoved)return;
  e.preventDefault();
  const t=e.touches[0];
  document.querySelectorAll(".cli-col-cards").forEach(c=>c.classList.remove("cli-col-drop"));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const col=el&&el.closest?el.closest(".cli-col-cards"):null;
  if(col)col.classList.add("cli-col-drop");
}
function cliTouchEnd(e){
  const card=e.currentTarget;
  if(card._holdTimer)clearTimeout(card._holdTimer);
  card.classList.remove("dragging");
  if(!cliDragId||!cliTouchMoved){cliDragId=null;return;}
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const col=el&&el.closest?el.closest(".cli-col-cards"):null;
  document.querySelectorAll(".cli-col-cards").forEach(c=>c.classList.remove("cli-col-drop"));
  if(col){
    const statusKey=col.getAttribute("data-status");
    if(statusKey){CLIENTS=CLIENTS.map(c=>c.id===cliDragId?{...c,status:statusKey}:c);saveData();}
  }
  cliDragId=null;cliTouchMoved=false;renderPage();renderNav();
}

function renderPlanning(){
  const ws=weekStart(currentWeekOffset);

  const wEnd=week[6];
  const wLabel=`${new Date(ws+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"})} — ${new Date(wEnd+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short",year:"numeric"})}`;
  const FILTERS=[
    {id:"tous",label:"Tous",color:TH.c1},
    {id:"rdv",label:"RDV",color:"#299AC3"},
    {id:"chantier",label:"Chantiers",color:"#b08d57"},
    {id:"prospection",label:"Prospection",color:"#3286A0"},
    {id:"autre",label:"Autre",color:"#64748b"},
  ];
  return `
    <div class="kpi-grid" style="cursor:pointer">
      <div class="kpi" style="background:${TH.card};${planningFilter==="tous"?"box-shadow:0 0 0 2px "+TH.c1:""}" onclick="planningFilter='tous';renderPage()">
        <div class="kpi-label" style="color:${TH.txt}">Cette semaine</div>
        <div class="kpi-value" style="color:${TH.c1}">${EVENTS.filter(e=>e.date>=ws&&e.date<=wEnd).length}</div>
      </div>
      <div class="kpi" style="background:${TH.card};${planningFilter==="rdv"?"box-shadow:0 0 0 2px #299AC3":""}" onclick="planningFilter='rdv';renderPage()">
        <div class="kpi-label" style="color:${TH.txt}">RDV clients</div>
        <div class="kpi-value" style="color:#299AC3">${EVENTS.filter(e=>e.type==="rdv").length}</div>
      </div>
      <div class="kpi" style="background:${TH.card};${planningFilter==="chantier"?"box-shadow:0 0 0 2px #b08d57":""}" onclick="planningFilter='chantier';renderPage()">
        <div class="kpi-label" style="color:${TH.txt}">Chantiers</div>
        <div class="kpi-value" style="color:#b08d57">${EVENTS.filter(e=>e.type==="chantier").length}</div>
      </div>
      <div class="kpi" style="background:${TH.card};${planningFilter==="prospection"?"box-shadow:0 0 0 2px #3286A0":""}" onclick="planningFilter='prospection';renderPage()">
        <div class="kpi-label" style="color:${TH.txt}">Prospections</div>
        <div class="kpi-value" style="color:#3286A0">${EVENTS.filter(e=>e.type==="prospection").length}</div>
      </div>
    </div>
    <div class="section-card" style="background:${TH.card}">
      <div class="section-head" style="flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <button class="btn-sm" onclick="currentWeekOffset--;renderPage()">◀</button>
          <span style="font-weight:600;font-size:13px;color:${TH.txt}">${wLabel}</span>
          <button class="btn-sm" onclick="currentWeekOffset++;renderPage()">▶</button>
          <button class="btn-sm" onclick="currentWeekOffset=0;renderPage()">Auj.</button>
        </div>
        <button class="btn-add" style="background:${TH.c1};color:#fff" onclick="modalEvent()">＋ Ajouter</button>
      </div>
      <div class="week-grid" id="week-grid-container">
        ${week.map((day,i)=>{
          const isT=day===getToday();
          const evs=EVENTS
            .filter(e=>e.date===day&&(planningFilter==="tous"||e.type===planningFilter))
            .sort((a,b)=>a.heure.localeCompare(b.heure));
          return`<div class="day-col"
            ondragover="event.preventDefault();this.style.background='${TH.c1}18'"
            ondragleave="this.style.background=''"
            ondrop="dropEvent(event,'${day}');this.style.background=''">
            <div class="day-header">
              <div class="day-name" style="color:${TH.txt}77">${JOURS[i]}</div>
              <div class="day-num${isT?" today":""}" style="${isT?`background:${TH.c1};color:#fff`:`color:${TH.txt}`}">${new Date(day+"T00:00:00").getDate()}</div>
            </div>
            ${evs.map(ev=>{const[bg,bdr]=EV_STYLE[ev.type]||["#f1f5f9","#64748b"];
              return`<div class="ev-pill"
                style="background:${bg};border-left-color:${bdr}"
                draggable="true"
                ondragstart="dragEvent(event,'${ev.id}')"
                ondragend="this.style.opacity='1'"
                onclick="modalEvent('${ev.id}')">
                <div class="ev-title" style="color:${TH.txt}">${ev.titre}</div>
                <div class="ev-time" style="color:${TH.txt}99">${ev.heure} · ${ev.client}</div>
              </div>`;}).join("")}
            <div onclick="modalEventDate('${day}')" style="text-align:center;font-size:16px;cursor:pointer;color:#cbd5e1;margin-top:4px;padding:2px" title="Ajouter un événement">＋</div>
          </div>`;}).join("")}
      </div>
    </div>`;
}
// Drag & drop planning
function dragEvent(event, id){
  event.dataTransfer.setData("evId", id);
  event.target.style.opacity="0.4";
}
function dropEvent(event, newDate){
  event.preventDefault();
  const id=event.dataTransfer.getData("evId");
  if(!id) return;
  EVENTS=EVENTS.map(e=>e.id===id?{...e,date:newDate}:e);
  renderPage();
}

function addConfigItem(type){
  const label=type==="cat"?"catégorie":"unité";
  const val=prompt(`Nouvelle ${label} :`);
  if(!val||!val.trim())return;
  const arr=type==="cat"?CAT_STOCK:UNITES;
  if(arr.includes(val.trim())){alert("Cette valeur existe déjà");return;}
  arr.push(val.trim());
  saveData();openPanelConfig();
}
function delConfigItem(type,i){
  const arr=type==="cat"?CAT_STOCK:UNITES;
  if(arr.length<=1){alert("Vous devez garder au moins une valeur");return;}
  if(!confirm(`Supprimer « ${arr[i]} » ?`))return;
  arr.splice(i,1);
  saveData();openPanelConfig();
}

function addPaiement(id){
  const montant=parseFloat(document.getElementById("pay-montant").value)||0;
  const date=document.getElementById("pay-date").value||TODAY;
  const mode=document.getElementById("pay-mode").value;
  if(montant<=0){alert("Montant invalide");return;}
  const f=FACTURES.find(x=>x.id===id);if(!f)return;
  if(!f.paiements)f.paiements=[];
  f.paiements.push({date,montant,mode});
  // Mise à jour automatique du statut
  if(facEstPayee(f))f.statut="payee";
  else if(facPaye(f)>0&&f.statut!=="payee")f.statut="partiel";
  logActivity("Paiement enregistré",`${fMoney(montant)} sur ${f.num} (${mode})`);
  closeModal();renderPage();renderNav();
}
function delPaiement(id,idx){
  const f=FACTURES.find(x=>x.id===id);if(!f||!f.paiements)return;
  if(!confirm("Supprimer ce paiement ?"))return;
  f.paiements.splice(idx,1);
  if(!facEstPayee(f)&&f.statut==="payee")f.statut=facPaye(f)>0?"partiel":"envoyee";
  logActivity("Paiement supprimé",f.num);
  modalPaiement(id);renderPage();renderNav();
}
// ── NIVEAUX DE RELANCE ──────────────────────────────────
function niveauRelance(f){
  const retard=Math.abs(daysDiff(f.ech));
  const nb=(f.relances||[]).length;
  if(nb===0&&retard<=15) return 1;
  if(nb<=1&&retard<=30) return 2;
  return 3;
}
function labelRelance(n){return["","1ère relance","2ème relance","Mise en demeure"][n]||"Mise en demeure";}
function colorRelance(n){return["","#b45309","#c2410c","#991b1b"][n]||"#991b1b";}
function bgRelance(n){return["","#fef9c3","#fff7ed","#fef2f2"][n]||"#fef2f2";}
function bordRelance(n){return["","#fcd34d","#fb923c","#fca5a5"][n]||"#fca5a5";}

function texteRelance(f,niveau){
  const cli=CLIENTS.find(c=>c.id===f.clientId)||CLIENTS.find(c=>c.nom===f.client);
  const contact=cli&&cli.contact?cli.contact:"Madame, Monsieur";
  const reste=facReste(f);
  const retard=Math.abs(daysDiff(f.ech));
  const emetteur=TH.nom+(TH.sous?" "+TH.sous:"");
  const email=TH.email||"";
  const tel=TH.tel||"";
  const coordonnees=email||tel?`\n${email}${tel?" · "+tel:""}\n`:"\n";
  if(niveau===1) return `Objet : Relance amiable — Facture ${f.num}\n\nBonjour ${contact},\n\nSauf erreur ou omission de notre part, il nous semble que la facture ${f.num} d'un montant de ${fMoney(reste)} (échéance du ${fDate(f.ech)}) n'a pas encore été réglée.\n\nNous vous remercions de bien vouloir procéder à son règlement dans les meilleurs délais ou de nous contacter si vous avez la moindre question.\n\nCordialement,\n${emetteur}${coordonnees}`;
  if(niveau===2) return `Objet : 2ème relance — Facture ${f.num} impayée\n\nBonjour ${contact},\n\nNous revenons vers vous concernant la facture ${f.num} d'un montant de ${fMoney(reste)}, dont l'échéance est dépassée depuis ${retard} jour(s) (${fDate(f.ech)}).\n\nMalgré notre première relance, nous n'avons pas reçu votre règlement. Merci de procéder au paiement sans délai ou de nous contacter pour convenir d'un arrangement.\n\nÀ défaut de réponse sous 8 jours, nous serons contraints d'engager une procédure de recouvrement.\n\nCordialement,\n${emetteur}${coordonnees}`;
  return `Objet : Mise en demeure — Facture ${f.num}\n\nBonjour ${contact},\n\nEn l'absence de règlement de la facture ${f.num} d'un montant de ${fMoney(reste)} malgré nos relances successives, nous vous mettons en demeure de procéder au paiement de cette somme dans un délai de 8 jours à compter de la réception de ce message.\n\nPassé ce délai, nous nous réservons le droit d'engager toute procédure judiciaire nécessaire au recouvrement de cette créance.\n\nCordialement,\n${emetteur}${coordonnees}`;
}

function modalRelancesImpayes(){
  const enRetard=FACTURES.filter(f=>facStatutReel(f)==="retard");
  if(enRetard.length===0){alert("Aucune facture en retard");return;}
  showModal("📨 Relances impayés",`
    <div class="info-box" style="margin-bottom:14px">Sélectionnez une facture pour générer le texte de relance adapté au niveau de retard.</div>
    ${enRetard.map(f=>{
      const reste=facReste(f);
      const retard=Math.abs(daysDiff(f.ech));
      const n=niveauRelance(f);
      const derniereRelance=(f.relances||[]).slice(-1)[0];
      return`<div style="border:1.5px solid ${bordRelance(n)};border-radius:12px;margin-bottom:10px;background:${bgRelance(n)};overflow:hidden">
        <div style="display:flex;align-items:center;gap:10px;padding:12px 14px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:700;color:${colorRelance(n)}">${f.num} · ${f.client}</span>
              <span style="font-size:10px;font-weight:700;background:${colorRelance(n)};color:#fff;padding:2px 8px;border-radius:20px;text-transform:uppercase">${labelRelance(n)}</span>
            </div>
            <div style="font-size:12px;color:${colorRelance(n)};margin-top:3px">${fMoney(reste)} · Retard de ${retard} jour(s)${derniereRelance?" · Dernière relance : "+fDate(derniereRelance.date):""}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;padding:0 14px 12px;flex-wrap:wrap">
          <button onclick="voirTexteRelance('${f.id}')" style="padding:7px 12px;border-radius:8px;border:1.5px solid ${colorRelance(n)};background:#fff;color:${colorRelance(n)};cursor:pointer;font-size:12px;font-weight:700;font-family:'Inter',sans-serif">📋 Voir & copier</button>
          <button onclick="envoyerRelanceMail('${f.id}')" style="padding:7px 12px;border-radius:8px;border:none;background:${colorRelance(n)};color:#fff;cursor:pointer;font-size:12px;font-weight:700;font-family:'Inter',sans-serif">✉️ Ouvrir dans Mail</button>
          <button onclick="marquerRelanceEnvoyee('${f.id}')" style="padding:7px 12px;border-radius:8px;border:1.5px solid #94a3b8;background:#fff;color:#475569;cursor:pointer;font-size:12px;font-weight:700;font-family:'Inter',sans-serif">✅ Marquer envoyée</button>
        </div>
      </div>`;
    }).join("")}`,
    `<button class="btn-cancel" onclick="closeModal()">Fermer</button>`
  );
}

function voirTexteRelance(id){
  const f=FACTURES.find(x=>x.id===id);if(!f)return;
  const n=niveauRelance(f);
  const texte=texteRelance(f,n);
  const ta=document.createElement("textarea");
  ta.value=texte;ta.style.cssText="width:100%;height:260px;font-size:13px;font-family:'Inter',sans-serif;padding:12px;border-radius:10px;border:1.5px solid #e2e8f0;resize:vertical;line-height:1.6;color:#1A2118;background:#f8fafc";
  const copyBtn=document.createElement("button");
  copyBtn.textContent="📋 Copier le texte";
  copyBtn.style.cssText="margin-top:10px;padding:9px 16px;border-radius:9px;border:none;background:#3286A0;color:#fff;cursor:pointer;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;width:100%";
  copyBtn.onclick=function(){
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(texte).then(()=>{copyBtn.textContent="✅ Copié !";setTimeout(()=>{copyBtn.textContent="📋 Copier le texte";},2000);});
    } else {ta.select();document.execCommand("copy");copyBtn.textContent="✅ Copié !";}
  };
  const wrap=document.createElement("div");wrap.appendChild(ta);wrap.appendChild(copyBtn);
  showModal("📋 "+labelRelance(n)+" — "+f.num,wrap.innerHTML,`<button class="btn-cancel" onclick="closeModal()">Fermer</button>`);
  logActivity("Relance visualisée",f.num);
}

function envoyerRelanceMail(id){
  const f=FACTURES.find(x=>x.id===id);if(!f)return;
  const cli=CLIENTS.find(c=>c.id===f.clientId)||CLIENTS.find(c=>c.nom===f.client);
  const n=niveauRelance(f);
  const texte=texteRelance(f,n);
  const sujet=encodeURIComponent((["","Relance amiable","2ème relance","Mise en demeure"][n]||"Relance")+" — Facture "+f.num);
  const corps=encodeURIComponent(texte);
  const dest=cli&&cli.email?encodeURIComponent(cli.email):"";
  window.open(`mailto:${dest}?subject=${sujet}&body=${corps}`,"_blank");
  logActivity("Relance mail ouvert",f.num);
}

function marquerRelanceEnvoyee(id){
  const f=FACTURES.find(x=>x.id===id);if(!f)return;
  const n=niveauRelance(f);
  if(!f.relances) f.relances=[];
  f.relances.push({date:TODAY,niveau:n,label:labelRelance(n)});
  FACTURES=FACTURES.map(x=>x.id===id?f:x);
  saveData();
  logActivity("Relance marquée envoyée",f.num+" — "+labelRelance(n));
  closeModal();
  setTimeout(()=>modalRelancesImpayes(),100);
}

function copierRelance(id){voirTexteRelance(id);}

function saveTache(id){

  let lignesInit=(f.lignes&&f.lignes.length)?f.lignes:[{desc:"Prestation",qte:1,pu:Math.round((f.ttc||0)/(1+(facTauxTVA(f)/100)))}];
  window._facLignes=JSON.parse(JSON.stringify(lignesInit));
  showModal(id?"Modifier la facture":"Nouvelle facture",
    `<div class="field-row">
      <div class="field"><label>N° Facture</label><input id="fac-num" value="${f.num}"/></div>
      <div class="field"><label>Client *</label><select id="fac-client">

      <div class="field"><label>Statut</label><select id="fac-statut">${Object.entries(ST_FAC).map(([k,v])=>`<option value="${k}"${f.statut===k?" selected":""}>${v[2]}</option>`).join("")}</select></div>
    </div>
    <div class="field"><label>TVA (%)</label><input type="number" id="fac-tva" value="${facTauxTVA(f)}" oninput="updateFacTotaux()"/></div>
    <div class="field">
      <label>Ajout rapide depuis le catalogue</label>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <input id="fac-cat-search" placeholder="🔍 Filtrer les produits..." oninput="renderFacCataloguePicker(this.value)" style="flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff;outline:none;font-family:'Inter',sans-serif;min-width:0"/>
        <button onclick="modalAjoutProduitCatalogue()" style="padding:8px 12px;border-radius:8px;border:1.5px solid ${TH.c1};background:${TH.c1}08;color:${TH.c1};cursor:pointer;font-size:12px;font-weight:700;font-family:'Inter',sans-serif;white-space:nowrap">＋ Produit</button>

    </div>
    <div id="fac-totaux" style="background:#F7F4ED;border-radius:10px;padding:12px 16px;margin-bottom:14px"></div>`,
    `<button class="btn-cancel" onclick="closeModal()">Annuler</button>
     <button class="btn-save" style="background:${TH.c1}" onclick="saveFacture('${id||""}')">Enregistrer</button>`
  );
  renderFacLignes();

function renderFacLignes(){
  const box=document.getElementById("fac-lignes");
  if(!box)return;
  box.innerHTML=window._facLignes.map((l,i)=>`<div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
    <input value="${(l.desc||"").replace(/"/g,'&quot;')}" placeholder="Désignation" oninput="window._facLignes[${i}].desc=this.value;updateFacTotaux()" style="flex:3;padding:8px 10px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff;outline:none;font-family:'Inter',sans-serif;min-width:0"/>
    <input type="number" value="${l.qte}" placeholder="Qté" oninput="window._facLignes[${i}].qte=parseFloat(this.value)||0;updateFacTotaux()" style="width:56px;padding:8px 6px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff;outline:none;text-align:center;font-family:'Inter',sans-serif;flex-shrink:0"/>
    <input type="number" value="${l.pu}" placeholder="P.U." oninput="window._facLignes[${i}].pu=parseFloat(this.value)||0;updateFacTotaux()" style="width:72px;padding:8px 6px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff;outline:none;text-align:right;font-family:'Inter',sans-serif;flex-shrink:0"/>
    <button onclick="window._facLignes.splice(${i},1);renderFacLignes();updateFacTotaux()" style="width:30px;height:30px;border-radius:7px;border:1.5px solid #fecaca;background:#fef2f2;color:#991b1b;cursor:pointer;flex-shrink:0;font-size:13px">✕</button>
  </div>`).join("");
  updateFacTotaux();
}
function addFacLigne(){ window._facLignes.push({desc:"",qte:1,pu:0}); renderFacLignes(); }
function updateFacTotaux(){
  const box=document.getElementById("fac-totaux");
  if(!box)return;
  const tva=parseFloat(document.getElementById("fac-tva")?.value)||0;
  const ht=window._facLignes.reduce((s,l)=>s+(l.qte||0)*(l.pu||0),0);
  const mtva=ht*tva/100;
  box.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:#64748b">Total HT</span><span style="font-weight:600">${fMoney(ht)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">TVA ${tva}%</span><span style="font-weight:600">${fMoney(mtva)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:15px;padding-top:6px;border-top:1px solid #ddd"><span style="font-weight:700;color:${TH.txt}">Total TTC</span><span style="font-weight:800;color:${TH.c1}">${fMoney(ht+mtva)}</span></div>`;
}
function renderFacCataloguePicker(filter){
  const box=document.getElementById("fac-cat-picker");
  if(!box)return;
  filter=(filter||"").toLowerCase().trim();
  _pickerProduits=[
    ...CATALOGUE.map(p=>({nom:p.nom,pu:p.pu,src:"cat"})),
    ...STOCK.filter(s=>s.prix>0).map(s=>({nom:s.nom,pu:s.prix,src:"stock"}))
  ];
  const filtered=_pickerProduits.map((p,i)=>({...p,idx:i})).filter(p=>!filter||p.nom.toLowerCase().includes(filter));
  if(filtered.length===0){box.innerHTML=`<div style="padding:12px;color:#94a3b8;font-size:12px;width:100%;text-align:center">Aucun produit.</div>`;return;}
  box.innerHTML=filtered.map(p=>`<button type="button" onclick="addProduitToFacture(${p.idx})" style="display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:7px 11px;border-radius:9px;border:1.5px solid ${p.src==="stock"?"#fcd34d":"#e2e8f0"};background:${p.src==="stock"?"#fffbeb":"#fff"};cursor:pointer;font-family:'Inter',sans-serif;text-align:left">
    <span style="font-size:12px;font-weight:600;color:#1A2118">${p.nom}${p.src==="stock"?" 📦":""}</span>
    <span style="font-size:11px;color:${TH.c1};font-weight:700">${fMoney(p.pu)}</span>
  </button>`).join("");
}
function addProduitToFacture(idx){
  const p=_pickerProduits[idx];
  if(!p)return;
  const empty=window._facLignes.findIndex(l=>!l.desc&&!l.pu);
  if(empty!==-1){window._facLignes[empty]={desc:p.nom,qte:1,pu:p.pu};}
  else{window._facLignes.push({desc:p.nom,qte:1,pu:p.pu});}
  renderFacLignes();
}
function saveFacture(id){
  const clientId=document.getElementById("fac-client").value;
  const cli=CLIENTS.find(c=>c.id===clientId);
  const lignes=window._facLignes.filter(l=>l.desc||l.pu);
  if(lignes.length===0){alert("Ajoutez au moins une ligne");return;}
  const tva=parseFloat(document.getElementById("fac-tva").value)||0;
  const ht=lignes.reduce((s,l)=>s+(l.qte||0)*(l.pu||0),0);
  const obj={
    num:document.getElementById("fac-num").value,
    client:cli?cli.nom:"",
    clientId,
    ech:document.getElementById("fac-ech").value,
    statut:document.getElementById("fac-statut").value,
    tva,lignes,
    ttc:Math.round(ht*(1+tva/100))
  };
  if(id){FACTURES=FACTURES.map(f=>f.id===id?{...f,...obj}:f);logActivity("Modification facture",obj.num);}
  else{FACTURES.push({...obj,id:uid()});logActivity("Création facture",obj.num);}
  closeModal();renderPage();renderNav();
}
function delFacture(id){confirmDel("Supprimer cette facture ?",function(){FACTURES=FACTURES.filter(f=>f.id!==id);renderPage();renderNav();});}

function pipeFilter(list){
  const q=pipeSearch.toLowerCase().trim();
  if(!q) return list;

}
function pipeStats(){
  const active=PROSPECTS.filter(p=>p.stage!=="perdu"&&p.stage!=="gagne");
  const won=PROSPECTS.filter(p=>p.stage==="gagne");
  const pipeline=active.reduce((s,p)=>s+p.amount,0);
  const wonAmt=won.reduce((s,p)=>s+p.amount,0);
  const total=PROSPECTS.filter(p=>p.stage==="gagne"||p.stage==="perdu").length;
  const txConv=total>0?Math.round(won.length/total*100):0;
  const urgent=PROSPECTS.filter(p=>p.date&&p.date<=TODAY&&p.stage!=="gagne"&&p.stage!=="perdu").length;
  return{active,won,pipeline,wonAmt,txConv,urgent,total:PROSPECTS.length};
}

function pipeOnDrop(e,stageId){
  e.preventDefault();
  if(!pipeDragId) return;
  PROSPECTS=PROSPECTS.map(p=>p.id===pipeDragId?{...p,stage:stageId}:p);
  pipeDragId=null;saveData();renderPage();

// ── Drag tactile (iPad / mobile) ──────────────────────────────
let pipeTouchMoved=false;
function pipeTouchStart(e,id){
  pipeDragId=id;
  pipeTouchMoved=false;
  const card=e.currentTarget;
  card._holdTimer=setTimeout(()=>{
    card.classList.add("dragging");
    pipeTouchMoved=true; // active le mode déplacement après appui long
    if(navigator.vibrate)navigator.vibrate(30);
  },180);
}
function pipeTouchMove(e){
  if(!pipeDragId)return;
  if(!pipeTouchMoved)return; // pas encore en mode drag → laisser le scroll
  e.preventDefault();
  const t=e.touches[0];
  document.querySelectorAll(".pipe-cards").forEach(c=>c.classList.remove("pipe-drop-over"));
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const col=el&&el.closest?el.closest(".pipe-cards"):null;
  if(col)col.classList.add("pipe-drop-over");
}
function pipeTouchEnd(e){
  const card=e.currentTarget;
  if(card._holdTimer)clearTimeout(card._holdTimer);
  card.classList.remove("dragging");
  if(!pipeDragId||!pipeTouchMoved){pipeDragId=null;return;}
  const t=e.changedTouches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const col=el&&el.closest?el.closest(".pipe-cards"):null;
  document.querySelectorAll(".pipe-cards").forEach(c=>c.classList.remove("pipe-drop-over"));
  if(col){
    const stageId=col.getAttribute("data-stage");
    if(stageId){PROSPECTS=PROSPECTS.map(p=>p.id===pipeDragId?{...p,stage:stageId}:p);saveData();}
  }
  pipeDragId=null;pipeTouchMoved=false;renderPage();
}

    <input type="number" value="${l.qte}" placeholder="Qté" oninput="window._devisLignes[${i}].qte=parseFloat(this.value)||0;updateDevisTotaux()" style="width:56px;padding:8px 6px;border-radius:8px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff;outline:none;text-align:center;font-family:'Inter',sans-serif;flex-shrink:0"/>

function addDevisLigne(){ window._devisLignes.push({desc:"",qte:1,pu:0}); renderDevisLignes(); }

// ── Sélecteur de produits (catalogue + stock) ──────────────────────────────
let _pickerProduits=[];
function renderCataloguePicker(filter){
  const box=document.getElementById("cat-picker");
  if(!box)return;
  filter=(filter||"").toLowerCase().trim();
  // Fusionner catalogue + produits du stock (avec prix)
  _pickerProduits=[
    ...CATALOGUE.map(p=>({nom:p.nom,pu:p.pu,src:"cat"})),
    ...STOCK.filter(s=>s.prix>0).map(s=>({nom:s.nom,pu:s.prix,src:"stock"}))
  ];
  const filtered=_pickerProduits
    .map((p,i)=>({...p,idx:i}))
    .filter(p=>!filter||p.nom.toLowerCase().includes(filter));
  if(filtered.length===0){box.innerHTML=`<div style="padding:12px;color:#94a3b8;font-size:12px;width:100%;text-align:center">Aucun produit. Cliquez sur « ＋ Produit » pour en créer.</div>`;return;}
  box.innerHTML=filtered.map(p=>`<button type="button" onclick="addProduitToDevis(${p.idx})" style="display:flex;flex-direction:column;align-items:flex-start;gap:1px;padding:7px 11px;border-radius:9px;border:1.5px solid ${p.src==="stock"?"#fcd34d":"#e2e8f0"};background:${p.src==="stock"?"#fffbeb":"#fff"};cursor:pointer;font-family:'Inter',sans-serif;text-align:left">
    <span style="font-size:12px;font-weight:600;color:#1A2118">${p.nom}${p.src==="stock"?" 📦":""}</span>
    <span style="font-size:11px;color:${TH.c1};font-weight:700">${fMoney(p.pu)}</span>
  </button>`).join("");
}
function addProduitToDevis(idx){
  const p=_pickerProduits[idx];
  if(!p)return;
  const empty=window._devisLignes.findIndex(l=>!l.desc&&!l.pu);
  if(empty!==-1){window._devisLignes[empty]={desc:p.nom,qte:1,pu:p.pu};}
  else{window._devisLignes.push({desc:p.nom,qte:1,pu:p.pu});}
  renderDevisLignes();
}
function modalAjoutProduitCatalogue(){
  const nom=prompt("Nom du produit / prestation :");
  if(!nom||!nom.trim())return;
  const puStr=prompt("Prix unitaire HT (€) :","0");
  if(puStr===null)return;
  const pu=parseFloat(puStr.replace(",","."))||0;
  CATALOGUE.push({id:uid(),nom:nom.trim(),pu});
  saveData();
  renderCataloguePicker(document.getElementById("cat-search")?.value||"");
}

// ── Gestion du catalogue (panneau) ─────────────────────────────────────────
function openPanelCatalogue(){
  const pc=document.getElementById("panel-container");
  pc.innerHTML=renderCataloguePanel();
}
function renderCataloguePanel(){
  return`<div class="panel-overlay">
    <div class="panel-bg" onclick="closeCataloguePanel()"></div>
    <div class="panel">

          CATALOGUE.map(p=>`<div style="display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid #f1f5f9">

              <div style="font-size:13px;font-weight:600;color:#1A2118">${p.nom}</div>
              <div style="font-size:12px;color:${TH.c1};font-weight:700">${fMoney(p.pu)}</div>
            </div>
            <button onclick="editCatalogueItem('${p.id}')" style="padding:5px 9px;border-radius:7px;border:1.5px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;cursor:pointer;font-size:12px">✏️</button>
            <button onclick="delCatalogueItem('${p.id}')" style="padding:5px 9px;border-radius:7px;border:1.5px solid #fecaca;background:#fef2f2;color:#991b1b;cursor:pointer;font-size:12px">🗑️</button>
          </div>`).join("")}
      </div>
    </div>
  </div>`;
}
function closeCataloguePanel(){ document.getElementById("panel-container").innerHTML=""; }
function addCatalogueItem(){
  const nom=prompt("Nom du produit / prestation :");
  if(!nom||!nom.trim())return;
  const puStr=prompt("Prix unitaire HT (€) :","0");
  if(puStr===null)return;
  CATALOGUE.push({id:uid(),nom:nom.trim(),pu:parseFloat((puStr||"").replace(",","."))||0});
  saveData();openPanelCatalogue();
}
function editCatalogueItem(id){
  const p=CATALOGUE.find(x=>x.id===id);if(!p)return;
  const nom=prompt("Nom du produit :",p.nom);
  if(nom===null)return;
  const puStr=prompt("Prix unitaire HT (€) :",p.pu);
  if(puStr===null)return;
  p.nom=nom.trim()||p.nom;
  p.pu=parseFloat((puStr||"").replace(",","."))||0;
  saveData();openPanelCatalogue();
}
function delCatalogueItem(id){
  if(!confirm("Supprimer ce produit du catalogue ?"))return;
  CATALOGUE=CATALOGUE.filter(x=>x.id!==id);
  saveData();openPanelCatalogue();
}
function updateDevisTotaux(){
  const box=document.getElementById("dv-totaux");
  if(!box)return;
  const tva=parseFloat(document.getElementById("dv-tva")?.value)||0;
  const ht=window._devisLignes.reduce((s,l)=>s+(l.qte||0)*(l.pu||0),0);
  const mtva=ht*tva/100;
  box.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="color:#64748b">Total HT</span><span style="font-weight:600">${fMoney(ht)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">TVA ${tva}%</span><span style="font-weight:600">${fMoney(mtva)}</span></div>
    <div style="display:flex;justify-content:space-between;font-size:15px;padding-top:6px;border-top:1px solid #ddd"><span style="font-weight:700;color:${TH.txt}">Total TTC</span><span style="font-weight:800;color:${TH.c1}">${fMoney(ht+mtva)}</span></div>`;

function saveDevis(id){
  const clientId=document.getElementById("dv-client").value;
  if(!clientId){alert("Veuillez choisir un client");return;}
  const lignes=window._devisLignes.filter(l=>l.desc||l.pu);
  if(lignes.length===0){alert("Ajoutez au moins une ligne");return;}
  const obj={
    num:document.getElementById("dv-num").value.trim(),
    clientId,
    date:document.getElementById("dv-date").value,
    validite:document.getElementById("dv-validite").value,
    statut:document.getElementById("dv-statut").value,
    tva:parseFloat(document.getElementById("dv-tva").value)||0,
    notes:document.getElementById("dv-notes").value.trim(),
    lignes
  };
  if(id){DEVIS=DEVIS.map(d=>d.id===id?{...d,...obj}:d);logActivity("Modification devis",obj.num);}
  else{DEVIS.push({...obj,id:uid()});logActivity("Création devis",obj.num);}
  closeModal();renderPage();renderNav();
}
function delDevis(id){const d=DEVIS.find(x=>x.id===id);confirmDel("Supprimer ce devis ?",function(){DEVIS=DEVIS.filter(x=>x.id!==id);logActivity("Suppression devis",d?d.num:"");renderPage();});}

function devisVersFacture(id){
  const d=DEVIS.find(x=>x.id===id);if(!d)return;
  const cli=CLIENTS.find(c=>c.id===d.clientId);
  if(!confirm("Créer une facture à partir de ce devis ?"))return;
  const num="FAC-"+new Date().getFullYear()+"-"+String(FACTURES.length+1).padStart(3,"0");
  FACTURES.push({
    id:uid(),num,
    client:cli?cli.nom:"",
    clientId:d.clientId,
    ech:addDays(TODAY,30),
    statut:"envoyee",
    tva:d.tva||20,
    lignes:JSON.parse(JSON.stringify(d.lignes||[])),  // reprend TOUTES les lignes du devis
    ttc:Math.round(devisTTC(d))
  });
  logActivity("Conversion devis→facture",`${d.num} → ${num} (${(d.lignes||[]).length} ligne(s))`);
  alert(`Facture ${num} créée avec le détail des articles ! Retrouvez-la dans Administration.`);
  renderPage();renderNav();
}

// Calcule le CA encaissé par mois sur les 6 derniers mois (depuis FACTURES payées)
function caParMois(){
  const mois=[];
  const now=new Date();
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=d.toISOString().slice(0,7);
    const label=d.toLocaleDateString("fr-FR",{month:"short"});
    const total=FACTURES.filter(f=>f.statut==="payee"&&f.ech&&f.ech.slice(0,7)===key).reduce((s,f)=>s+(f.ttc||0),0);
    mois.push({key,label,total});
  }
  return mois;
}

// Graphique en courbe (CA par mois)
function lineChart(data,color,height){
  height=height||160;
  const w=520, h=height, padL=48, padB=28, padT=14, padR=12;
  const max=Math.max(...data.map(d=>d.total),1);
  const niceMax=Math.ceil(max/1000)*1000||1000;
  const cw=w-padL-padR, ch=h-padT-padB;
  const px=i=>padL+(data.length<=1?cw/2:i*cw/(data.length-1));
  const py=v=>padT+ch-(v/niceMax)*ch;
  const pts=data.map((d,i)=>`${px(i)},${py(d.total)}`).join(" ");
  const area=`${padL},${padT+ch} ${pts} ${px(data.length-1)},${padT+ch}`;
  // lignes de grille
  let grid="";
  for(let g=0;g<=3;g++){
    const y=padT+ch-(g/3)*ch;
    const val=Math.round(niceMax*g/3);
    grid+=`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="#e8e4dc" stroke-width="1"/>`;
    grid+=`<text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="#94a3b8">${val>=1000?(val/1000)+"k":val}</text>`;
  }
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
    ${grid}
    <polygon points="${area}" fill="${color}" opacity="0.1"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.total)}" r="3.5" fill="#fff" stroke="${color}" stroke-width="2"/>
      <text x="${px(i)}" y="${h-9}" text-anchor="middle" font-size="9" fill="#64748b">${d.label}</text>`).join("")}
  </svg>`;
}

// Donut chart (répartition pipeline)
function donutChart(segments,centerLabel,centerValue){
  const total=segments.reduce((s,x)=>s+x.value,0)||1;
  const cx=80,cy=80,r=60,sw=22;
  let acc=0;
  const arcs=segments.filter(s=>s.value>0).map(s=>{
    const frac=s.value/total;
    const start=acc*2*Math.PI-Math.PI/2;
    acc+=frac;
    const end=acc*2*Math.PI-Math.PI/2;
    const large=frac>0.5?1:0;
    const x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    const x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    return`<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${s.color}" stroke-width="${sw}"/>`;
  }).join("");
  return`<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap">
    <svg viewBox="0 0 160 160" style="width:140px;height:140px;flex-shrink:0">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1ede5" stroke-width="${sw}"/>
      ${arcs}
      <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="20" font-weight="700" fill="#1A2118">${centerValue}</text>
      <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="9" fill="#94a3b8">${centerLabel}</text>
    </svg>
    <div style="flex:1;min-width:120px">
      ${segments.map(s=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="width:11px;height:11px;border-radius:3px;background:${s.color};flex-shrink:0"></span>
        <span style="font-size:12px;color:#475569;flex:1">${s.label}</span>
        <span style="font-size:12px;font-weight:700;color:#1A2118">${s.value}</span>
      </div>`).join("")}
    </div>
  </div>`;
}

// Export Excel (xlsx via SheetJS chargé à la demande)
function exportExcel(){
  if(typeof XLSX==="undefined"){
    const script=document.createElement("script");
    script.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
    script.onload=()=>doExportExcel();
    script.onerror=()=>alert("Impossible de charger le module Excel (vérifiez votre connexion).");
    document.head.appendChild(script);
  } else {
    doExportExcel();
  }
}
function doExportExcel(){
  try{
    const wb=XLSX.utils.book_new();
    // Clients
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(CLIENTS.map(c=>({
      Nom:c.nom,Contact:c.contact||"",Téléphone:c.tel||"",Email:c.email||"",
      Catégorie:c.cat||"",Statut:c.status||"","CA (€)":c.ca||0,"Dernière commande":c.dernCmd||""
    }))),"Clients");
    // Prospects
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(PROSPECTS.map(p=>({
      Nom:p.name,Entreprise:p.company||"",Email:p.email||"",Téléphone:p.phone||"",
      "Montant (€)":p.amount||0,Température:p.temp||"",Étape:p.stage||"",Relance:p.date||""
    }))),"Prospects");
    // Factures
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(FACTURES.map(f=>({
      Numéro:f.num||"",Client:f.client||"","Montant TTC (€)":f.ttc||0,Statut:f.statut||"",Échéance:f.ech||""
    }))),"Factures");
    // Stock
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(STOCK.map(s=>({
      Produit:s.nom,Quantité:s.qte,Seuil:s.seuil,"Prix unitaire (€)":s.prix,"Valeur (€)":(s.qte*s.prix)
    }))),"Stock");
    const date=new Date().toISOString().split("T")[0];
    XLSX.writeFile(wb,`adsecure-export-${date}.xlsx`);
    logActivity("Export Excel","Données exportées en Excel");
  }catch(e){
    alert("Erreur lors de l'export Excel : "+e.message);
  }
}

function previewAvatar(ev){
  const file=ev.target.files[0];if(!file)return;
  if(file.size>500000){alert("Image trop lourde (max 500 Ko)");return;}
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById("u-avatar").value=e.target.result;
    const prev=document.getElementById("u-avatar-preview");
    if(prev)prev.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover"/>`;
  };
  reader.readAsDataURL(file);
}
function updateAvatarInitial(name){
  const prev=document.getElementById("u-avatar-preview");
  const av=document.getElementById("u-avatar");
  if(prev&&av&&!av.value){prev.textContent=name?name.charAt(0).toUpperCase():"?";}
}
async function saveUser(id){
  const nom=document.getElementById("u-nom").value.trim();
  const login=document.getElementById("u-login").value.trim();
  const pwd=document.getElementById("u-pwd").value.trim();
  const role=document.getElementById("u-role").value;
  const email=document.getElementById("u-email").value.trim();
  const tel=document.getElementById("u-tel").value.trim();
  const poste=document.getElementById("u-poste").value.trim();
  const avatar=document.getElementById("u-avatar").value;
  const actif=document.getElementById("u-actif").value==="true";
  if(!nom||!login){alert("Nom et identifiant obligatoires");return;}
  if(!id&&!pwd){alert("Mot de passe obligatoire pour un nouvel utilisateur");return;}
  const existing=USERS.find(u=>u.login===login&&u.id!==id);
  if(existing){alert("Cet identifiant est déjà utilisé");return;}
  if(id){
    const idx=USERS.findIndex(u=>u.id===id);
    if(idx!==-1){
      const updated={...USERS[idx],nom,login,role,email,tel,poste,avatar,actif};
      if(pwd)updated.passHash=await hashPassword(pwd);
      USERS[idx]=updated;
      logActivity("Modification utilisateur",`Profil de ${nom} mis à jour`);
      if(currentUser&&currentUser.id===id){
        currentUser={...currentUser,nom,login,role,email,tel,poste,avatar};
        sessionStorage.setItem("gp_user",JSON.stringify(currentUser));
      }
    }
  } else {
    const passHash=await hashPassword(pwd);
    USERS.push({id:uid(),nom,login,passHash,role,email,tel,poste,avatar,actif,creeLe:TODAY});
    logActivity("Création utilisateur",`Nouvel utilisateur : ${nom} (${role})`);
  }
  closeModal();
  renderPanel();
  renderNav();
}
function delUser(id){
  if(USERS.length<=1){alert("Impossible de supprimer le dernier utilisateur");return;}
  const u=USERS.find(x=>x.id===id);
  confirmDel("Supprimer cet utilisateur ?",function(){
    const idx=USERS.findIndex(x=>x.id===id);
    if(idx!==-1)USERS.splice(idx,1);
    logActivity("Suppression utilisateur",`${u?u.nom:"Utilisateur"} supprimé`);
    renderPanel();
  });
}

function bindPanel(){
  window.applyPreset=function(i){const p=PRESETS[i];Object.assign(TH,{c1:p.c1,c2:p.c2,sidebar:p.sb,bg:p.bg,card:p.card,txt:p.txt,sand:p.sand});applyTheme();renderNav();renderPanel();};
  window.handleLogo=function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{TH.logo=ev.target.result;applyTheme();renderPanel();};r.readAsDataURL(f);};
  window.dragStart=function(i){dragIdx=i;};
  window.dragOver=function(e,i){e.preventDefault();if(dragIdx===null||dragIdx===i)return;const sorted=[...RUBS].sort((a,b)=>a.ordre-b.ordre);const[m]=sorted.splice(dragIdx,1);sorted.splice(i,0,m);RUBS=sorted.map((r,idx)=>({...r,ordre:idx}));dragIdx=i;renderPanel();};
  window.dragEnd=function(){dragIdx=null;};
  window.toggleEmojiPicker=function(id){emojiPickerOpen=emojiPickerOpen===id?null:id;renderPanel();};
  window.setRubIcon=function(id,em){RUBS=RUBS.map(r=>r.id===id?{...r,icon:em}:r);emojiPickerOpen=null;renderPanel();};
  window.setRubLabel=function(id,v){RUBS=RUBS.map(r=>r.id===id?{...r,label:v}:r);};
  window.toggleRub=function(id){RUBS=RUBS.map(r=>r.id===id&&r.id!=="db"?{...r,actif:!r.actif}:r);renderPanel();};
}

function setSidebarVisuals(open){

// Réduction/expansion sur DESKTOP uniquement (bouton ☰ dans la sidebar)
function toggleSidebar(){
  if(window.innerWidth<=768) return;
  document.getElementById("app-screen").classList.toggle("collapsed");
}

// Applique le bon layout selon la largeur d'écran
function applyLayout(){
  const sb=document.getElementById("sidebar");
  const main=document.getElementById("main");
  const app=document.getElementById("app-screen");
  if(window.innerWidth<=768){
    // MOBILE : effacer styles inline, retirer collapsed, laisser le CSS gérer
    sb.style.width="";
    main.style.marginLeft="";
    sb.classList.remove("open");
    if(app)app.classList.remove("collapsed");
    const ov=document.getElementById("sidebar-overlay");
    if(ov)ov.classList.remove("open");
    setSidebarVisuals(true);
  } else {
    // DESKTOP/TABLETTE : effacer les inline pour laisser le CSS gérer
    sb.style.width="";
    main.style.marginLeft="";
  }
}

function initSidebar(){ applyLayout(); }

window.addEventListener("resize",function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(applyLayout,150);
});
